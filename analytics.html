<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/logo.png">
<title>題庫健檢儀表板 · 茲茲文教</title>
<style>
:root{
  --ink:#2d3038;--paper:#f6f5f2;--card:#fff;--line:#e6e4de;
  --bio:#1f6f5c;--phy:#b8860b;--earth:#3454b4;
  --red:#850103;--red2:#5e0102;--orange:#f9a12c;--gold:#af9a6b;--muted:#6e6f74;
  --shadow:0 2px 0 #eceae4,0 8px 24px -12px rgba(45,48,56,.16);
  --ui-font:"PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui-font);font-weight:500;background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh;font-size:14px;padding-bottom:60px}
.wrap{max-width:1320px;margin:0 auto;padding:0 20px}
header{background:#fffefb;border-bottom:1px solid var(--line);padding:13px 0;box-shadow:0 1px 2px rgba(45,48,56,.04)}
body.embedded header{display:none}
body.embedded{padding-bottom:20px}
body.embedded .wrap{padding:0 4px}
body.embedded .wrap[style]{padding-top:4px!important}
header .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:800;flex:1;min-width:200px}
header .sub{font-size:11.5px;color:var(--muted);margin-top:2px;font-weight:600}
.hbtn{padding:7px 14px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--ink);font-family:inherit;text-decoration:none;display:inline-block;transition:.15s}
.hbtn:hover{border-color:var(--red);color:var(--red)}
.hbtn.primary{background:var(--red);color:#fff;border-color:var(--red)}
.hbtn.primary:hover{background:var(--red2);color:#fff}

/* 範圍切換 */
.scope-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 0}
.scope-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted);transition:.15s}
.scope-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.scope-btn:not(.active):hover{border-color:var(--red);color:var(--red)}
.scope-info{font-size:12px;color:var(--muted);margin-left:auto}
.scope-info b{color:var(--red);font-size:14px}

/* 篩選列 */
.filter-bar{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px 14px;align-items:flex-end}
.f-item{display:flex;flex-direction:column;gap:4px;min-width:108px}
.f-item label{font-size:11px;font-weight:700;color:var(--muted)}
.f-item select,.f-item input{padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;font-family:inherit;background:#fff;color:var(--ink)}
.f-item select:focus,.f-item input:focus{outline:none;border-color:var(--red)}
.f-clear{align-self:flex-end;padding:6px 12px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:12px;font-family:inherit;cursor:pointer;color:var(--muted)}
.f-clear:hover{border-color:var(--red);color:var(--red)}

/* 卡片 / 區塊 */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;text-align:center}
.stat-card .n{font-size:26px;font-weight:800;color:var(--red)}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600}
.section{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px}
.section h2{font-size:15px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.section .desc{font-size:12px;color:var(--muted);margin-bottom:14px}
.section h2 .qtag{font-size:11px;font-weight:600;color:var(--muted);background:#f2f1ec;padding:2px 8px;border-radius:10px}

/* 條狀圖 */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12.5px}
.bar-row .lbl{width:130px;flex-shrink:0;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .bar-wrap{flex:1;background:#f2f1ec;border-radius:5px;height:16px;overflow:hidden;position:relative}
.bar-row .bar-fill{height:100%;background:linear-gradient(90deg,var(--red),#a83a3c);border-radius:5px}
.bar-row .val{width:92px;flex-shrink:0;text-align:right;color:var(--muted);font-size:11.5px}
.bar-row.warn .bar-fill{background:linear-gradient(90deg,var(--orange),#e08e1f)}

/* 國中／高中分開統計 */
.split-two{display:flex;gap:24px;flex-wrap:wrap}
.split-two>.split-half{flex:1;min-width:260px}
.split-label{font-size:12.5px;font-weight:800;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.split-label .split-n{font-size:11px;font-weight:600;color:var(--muted);background:#f2f1ec;padding:2px 8px;border-radius:10px}
.chapter-level:not(:last-child){border-bottom:1px solid var(--line);margin-bottom:18px;padding-bottom:16px}

/* 章節覆蓋地圖：一律展開、不需點擊，用縮排取代 details 摺疊 */
.chapter-tree{font-size:12.5px}
.ct-row{display:flex;align-items:center;gap:8px;padding:3px 6px 3px calc(6px + var(--depth,0) * 16px);border-radius:5px}
.ct-row.ct-node{font-weight:700}
.ct-row.ct-d0{font-size:13.5px;padding-top:9px;margin-top:5px;border-top:1px solid var(--line)}
.ct-row.ct-d0:first-child{border-top:none;margin-top:0;padding-top:2px}
.ct-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct-cnt{color:var(--muted);font-size:11px;flex-shrink:0;white-space:nowrap;width:130px;text-align:center;font-variant-numeric:tabular-nums}
.ct-row.ct-leaf{font-weight:500}
.ct-bar{width:56px;height:6px;background:#f2f1ec;border-radius:3px;overflow:hidden;flex-shrink:0}
.ct-bar>i{display:block;height:100%;background:var(--red);border-radius:3px}
.ct-warn{color:#b23b3b}

/* 待確認清單 */
.pend-item{border-bottom:1px solid var(--line);padding:10px 4px;font-size:12.5px}
.pend-item:last-child{border-bottom:none}
.pend-item .title{font-weight:700;margin-bottom:2px}
.pend-item .meta{color:var(--muted);font-size:11.5px}
.pend-item .reason{color:#b23b3b;background:#fdf2f0;border-left:3px solid #e08e1f;padding:4px 8px;border-radius:0 5px 5px 0;margin-top:4px;font-size:12px}

/* 比較報告 */
.insight-box{background:#fff8ec;border:1px solid #f0dcaf;border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.8;color:#7a5b16;margin-bottom:14px}
.insight-box b{color:#5c4310}
.cmp-row{display:flex;align-items:center;gap:10px;font-size:12.5px;margin-bottom:8px}
.cmp-row .lbl{width:130px;flex-shrink:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmp-row .cmp-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.cmp-row .cmp-line{display:flex;align-items:center;gap:6px}
.cmp-row .cmp-line .tag{width:44px;flex-shrink:0;font-size:10.5px;color:var(--muted)}
.cmp-row .cmp-line .bar-wrap{flex:1;background:#f2f1ec;border-radius:4px;height:11px;overflow:hidden}
.cmp-row .cmp-line .bar-fill{height:100%;border-radius:4px}
.cmp-row .cmp-line.this .bar-fill{background:var(--red)}
.cmp-row .cmp-line.base .bar-fill{background:var(--gold)}
.cmp-row .pct{width:80px;flex-shrink:0;text-align:right;font-size:11px;color:var(--muted)}

.empty-note{text-align:center;color:var(--muted);padding:30px 10px;font-size:13px}
.loading{text-align:center;color:var(--muted);padding:60px 10px}
.roadmap{font-size:11.5px;color:var(--muted);text-align:center;padding:10px 0 30px;line-height:1.9}

/* 甜甜圈圖 + 圖例 */
.donut-flex{display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.donut-flex svg{flex-shrink:0}
.legend{flex:1;min-width:180px;display:flex;flex-direction:column;gap:2px}
.legend-item{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;font-size:12.5px;cursor:default;transition:.12s}
.legend-item.clickable{cursor:pointer}
.legend-item.clickable:hover{background:#faf5f0}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.legend-item .lname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.legend-item .lval{color:var(--muted);font-size:11.5px;flex-shrink:0}
.legend-item .lchevron{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform .15s;width:12px;text-align:center}
.legend-item.open .lchevron{transform:rotate(90deg)}

/* 兩層式鑽取 */
.drill-panel{display:none;margin:2px 0 6px 20px;padding:8px 10px 4px;border-left:2px solid var(--line)}
.drill-panel.open{display:block}

/* 100% 堆疊長條 */
.stack-bar{display:flex;width:100%;height:26px;border-radius:7px;overflow:hidden;margin-bottom:10px}
.stack-bar>div{height:100%;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden}
.stack-legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-bottom:16px;font-size:11.5px;color:var(--muted)}
.stack-legend span{display:inline-flex;align-items:center;gap:5px}
.stack-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* 折線圖 */
.line-chart-wrap{overflow-x:auto}
.line-chart-wrap svg{display:block}

/* 可排序表格 */
.dt-wrap{overflow-x:auto;margin-bottom:6px}
table.dt{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
table.dt th{text-align:left;padding:7px 10px;border-bottom:2px solid var(--line);color:var(--muted);font-weight:700;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card)}
table.dt th:hover{color:var(--red)}
table.dt th.sorted::after{content:' ▾';color:var(--red)}
table.dt th.sorted.asc::after{content:' ▴'}
table.dt td{padding:6px 10px;border-bottom:1px solid var(--line)}
table.dt tr.clickable{cursor:pointer}
table.dt tr.clickable:hover td{background:#faf5f0}
table.dt th.num,table.dt td.num{text-align:center;font-variant-numeric:tabular-nums}
table.dt td.warn{color:#b23b3b;font-weight:700}
.pp-up{color:#1f6f5c;font-weight:700}
.pp-down{color:#b23b3b;font-weight:700}

/* 熱度圖 */
.heat-wrap{overflow-x:auto}
table.heat{border-collapse:collapse;font-size:11px}
table.heat th{padding:5px 8px;color:var(--muted);font-weight:700;white-space:nowrap;position:sticky;top:0;background:var(--card)}
table.heat th.rowhead{text-align:left;position:sticky;left:0;background:var(--card);z-index:2;max-width:160px;overflow:hidden;text-overflow:ellipsis}
table.heat td{padding:5px 8px;text-align:center;cursor:pointer;white-space:nowrap;border:1px solid #fff;min-width:64px}
table.heat td:hover{outline:2px solid var(--ink)}
table.heat td .n{font-weight:700}
table.heat td .p{font-size:9.5px;opacity:.85}
table.heat td.empty{background:#f2f1ec!important;color:var(--muted);cursor:default}
table.heat td.empty:hover{outline:none}

/* 控制列小標籤 */
.yc-note{font-size:11px;color:var(--muted);background:#f2f1ec;border-radius:6px;padding:3px 8px;display:inline-block;margin:0 0 8px}
.yc-warn-note{font-size:11.5px;color:#7a5b16;background:#fff8ec;border:1px solid #f0dcaf;border-radius:8px;padding:6px 10px;margin-bottom:10px}

/* 資料品質 */
.dq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:6px}
.dq-card{background:#fdfaf5;border:1px solid #ecdfc2;border-radius:10px;padding:11px 13px;cursor:pointer;transition:.12s}
.dq-card:hover{border-color:var(--red)}
.dq-card .n{font-size:20px;font-weight:800;color:#a8641c}
.dq-card .n.zero{color:var(--muted);font-weight:600}
.dq-card .lbl{font-size:11.5px;color:#7a6e60;margin-top:2px;line-height:1.4}
.dq-samples{font-size:11.5px;color:var(--muted);margin-top:16px}
.dq-samples .row{padding:5px 4px;border-bottom:1px solid var(--line)}
.dq-card .pctline{font-size:10.5px;color:#9a8b74;margin-top:1px}
.dq-card.open{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
.dq-card .dq-caret{font-size:10px;color:#b9a27a;margin-left:4px}
.dq-panel{margin-top:14px;border:1px solid var(--line);border-radius:10px;background:#fffdf8;overflow:hidden}
.dq-panel-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:9px 13px;background:#fbf4e8;border-bottom:1px solid var(--line);font-size:12.5px}
.dq-hit{padding:7px 13px;border-bottom:1px solid var(--line);cursor:pointer}
.dq-hit:last-child{border-bottom:none}
.dq-hit:hover{background:#faf5f0}
.dq-hit .dq-hit-t{display:block;font-weight:700;font-size:12.5px;color:var(--ink)}
.dq-hit .dq-hit-m{display:block;font-size:11px;color:var(--muted);margin-top:1px}

/* sticky 區段導覽 */
.secnav{position:sticky;top:0;z-index:30;background:rgba(246,245,242,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);display:flex;gap:4px;flex-wrap:wrap;padding:8px 4px;margin:0 -4px 14px}
.secnav a{font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;padding:5px 11px;border-radius:16px;border:1px solid transparent;white-space:nowrap;transition:.12s}
.secnav a:hover{color:var(--red);border-color:var(--line)}
.secnav a.active{background:var(--red);color:#fff}
body.embedded .secnav{top:0}

/* 可收合區塊 */
.section>h2{cursor:pointer;user-select:none}
.section>h2 .collapse-ar{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .15s}
.section.collapsed>h2 .collapse-ar{transform:rotate(-90deg)}
.section.collapsed>*:not(h2){display:none!important}

/* badge / info icon */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--muted);background:#f2f1ec;border-radius:14px;padding:3px 11px}
.badge b{color:var(--red)}
.info-i{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#d8d4cc;color:#fff;font-size:10px;font-weight:800;cursor:help;margin-left:5px;font-style:normal}

/* 內嵌分頁 [整體分布][年度變化] */
.tabbar{display:inline-flex;gap:3px;background:#f2f1ec;border-radius:9px;padding:3px;margin-bottom:12px}
.tabbar button{border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);padding:5px 14px;border-radius:7px;cursor:pointer}
.tabbar button.active{background:#fff;color:var(--red);box-shadow:0 1px 3px rgba(45,48,56,.12)}

/* 折疊式章節樹 */
.cov-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cov-tools input[type=text]{padding:5px 9px;border:1px solid var(--line);border-radius:7px;font-size:12px;font-family:inherit;min-width:150px}
.covtree details{margin:0}
.covtree summary{list-style:none;display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:12.5px}
.covtree summary::-webkit-details-marker{display:none}
.covtree summary:hover{background:#faf5f0}
.covtree summary .tw{width:12px;flex-shrink:0;color:var(--muted);font-size:10px;transition:transform .15s}
.covtree details[open]>summary .tw{transform:rotate(90deg)}
.covtree summary .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.covtree summary .cnt{flex-shrink:0;width:130px;text-align:center;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.covtree .kids{padding-left:16px;border-left:1px solid var(--line);margin-left:9px}
.covtree .leaf{display:flex;align-items:center;gap:8px;padding:3px 6px;font-size:12px}
.covtree .leaf .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.covtree .leaf .cnt{flex-shrink:0;width:130px;text-align:center;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.covtree .low{color:#b6a06a;font-size:10.5px;margin-left:4px}
.covtree .unitwarn{font-size:10.5px;color:#b6a06a;font-weight:500;margin-left:6px}
.nonstd-box{border:1px dashed #d8b98a;border-radius:9px;padding:4px 12px;margin-top:12px;background:#fdfaf4}
.nonstd-box>summary{font-size:12px;font-weight:700;color:#a8641c;cursor:pointer;padding:6px 2px;list-style:none}
.nonstd-box>summary::-webkit-details-marker{display:none}
.cov-rate{font-size:12px;color:var(--muted);margin-bottom:8px}
.cov-rate b{color:var(--red);font-size:14px}

</style>
</head>
<body>
<script>if(window!==window.top)document.body.classList.add('embedded');</script>

<header>
  <div class="wrap row">
    <div>
      <h1>題庫健檢儀表板</h1>
      <div class="sub">CHAPTER COVERAGE &amp; QUALITY ANALYTICS</div>
    </div>
    <a class="hbtn" href="index.html">← 回題庫</a>
    <button class="hbtn" onclick="loadAll()">重新整理</button>
  </div>
</header>

<div class="wrap" style="padding-top:16px">

  <div class="scope-bar">
    <button class="scope-btn active" id="scopeAllBtn" onclick="setScope('all')">全題庫</button>
    <button class="scope-btn" id="scopeFilterBtn" onclick="setScope('filtered')">目前篩選結果</button>
    <button class="scope-btn" id="scopePickedBtn" onclick="setScope('picked')">已選取題目／考卷</button>
    <div class="scope-info" id="scopeInfo"></div>
  </div>

  <div class="filter-bar" id="filterBar">
    <div class="f-item"><label>學制</label><select id="fLevel" onchange="onFilterChange()"><option value="">全部</option><option>國中</option><option>高中</option></select></div>
    <div class="f-item"><label>領域</label><select id="fField" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>冊次</label><select id="fBook" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>大單元</label><select id="fUnit" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>子單元</label><select id="fSub" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>年級</label><select id="fGrade" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>年度</label><select id="fYear" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>來源學校</label><select id="fSchool" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>考試種類</label><select id="fExamType" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>題型</label><select id="fType" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>圖表類型</label><select id="fChart" onchange="onFilterChange()"><option value="">全部</option></select></div>
    <div class="f-item"><label>難度</label><select id="fDiff" onchange="onFilterChange()"><option value="">全部</option><option>簡單</option><option>中等</option><option>困難</option><option>極難</option><option>未評分</option></select></div>
    <div class="f-item"><label>是否題組</label><select id="fGroup" onchange="onFilterChange()"><option value="">全部</option><option value="y">是</option><option value="n">否</option></select></div>
    <div class="f-item"><label>是否待確認</label><select id="fFlag" onchange="onFilterChange()"><option value="">全部</option><option value="y">待確認</option><option value="n">已確認</option></select></div>
    <button class="f-clear" onclick="clearFilters()">清除篩選</button>
  </div>

  <div class="filter-bar" id="yearCtrlBar" style="gap:10px 18px">
    <div style="flex-basis:100%;display:flex;align-items:center;gap:8px;margin-bottom:-2px">
      <span style="font-size:11.5px;font-weight:800;color:var(--red)">A · 全域分析範圍</span>

// ── 依 syllabus.js（翰林版國中＋龍騰版高中課綱）建立冊次→領域對照、單元/子單元的課綱順序 ──

const SYL_SUB_LIST={};        // dbBookKey+''+大單元 -> [子單元,...]（課綱順序）
const SYL_BOOK_ORDER_JH=[],SYL_BOOK_ORDER_HS=[];
SYL_ROWS.forEach(r=>{
  const isHS=HS_BOOKS.includes(r.book);

  if(!(key in SYL_FIELD_OF_BOOK)){
    SYL_FIELD_OF_BOOK[key]=r.field;

  (SYL_UNIT_LIST[key]=SYL_UNIT_LIST[key]||[]);

function dbBookKey(r){return r.level==='高中'?(r.book||r.book_name||''):(r.book_name||r.book||'');}
function syllabusIdx(list,val){const i=(list||[]).indexOf(val);return i<0?9999:i;}
// 各學制的「大單元／子單元」全域課綱順序（把各冊的單元依冊次順序串起來）
const SYL_UNIT_ORDER_JH=[],SYL_SUB_ORDER_JH=[],SYL_UNIT_ORDER_HS=[],SYL_SUB_ORDER_HS=[];
[['JH',SYL_BOOK_ORDER_JH,SYL_UNIT_ORDER_JH,SYL_SUB_ORDER_JH],['HS',SYL_BOOK_ORDER_HS,SYL_UNIT_ORDER_HS,SYL_SUB_ORDER_HS]].forEach(([,books,unitOut,subOut])=>{
  books.forEach(bk=>{
    (SYL_UNIT_LIST[bk]||[]).forEach(u=>{
      if(!unitOut.includes(u))unitOut.push(u);

});
// 數字感知比較（"C1"<"C2"、"2-1"<"10-1"、"第一章"依中文數字），供課綱外項目的次序 fallback
const _CJK_NUM={'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function _cjkChapterNum(s){const m=String(s).match(/第([一二三四五六七八九十]+)章/);if(!m)return null;let t=m[1],v=0;if(t.includes('十')){const p=t.split('十');v=(p[0]?(_CJK_NUM[p[0]]||1):1)*10+(p[1]?(_CJK_NUM[p[1]]||0):0);}else v=_CJK_NUM[t]||0;return v;}
function naturalCmp(a,b){
  const ca=_cjkChapterNum(a),cb=_cjkChapterNum(b);
  if(ca!=null&&cb!=null&&ca!==cb)return ca-cb;
  return String(a).localeCompare(String(b),'zh-Hant',{numeric:true});
}
// 依課綱順序排序某層級的分類鍵；不在課綱者排最後，並以數字感知比較收尾
function chapterOrderList(level,chapLevel){
  const isHS=level==='高中';
  if(chapLevel==='field')return isHS?HS_FIELDS:JH_FIELDS;
  if(chapLevel==='book')return isHS?SYL_BOOK_ORDER_HS:SYL_BOOK_ORDER_JH;
  if(chapLevel==='unit')return isHS?SYL_UNIT_ORDER_HS:SYL_UNIT_ORDER_JH;
  if(chapLevel==='sub')return isHS?SYL_SUB_ORDER_HS:SYL_SUB_ORDER_JH;
  return [];
}
function sortByChapter(cats,level,chapLevel){
  const ord=chapterOrderList(level,chapLevel);
  return [...cats].sort((a,b)=>{
    const ia=syllabusIdx(ord,a),ib=syllabusIdx(ord,b);
    if(ia!==ib)return ia-ib;
    return naturalCmp(a,b);
  });
}

// ── 年度正規化：112上、113-下學期、114學測、114分科測驗、114會考…→ {aca(學年度), term(學期/考試類型), valid} ──
// 只用於統計用的計算欄位，不改寫原始資料
function normalizeYear(rawYear,examTypeC){
  const y=(rawYear||'').trim();
  if(!y)return {aca:null,term:null,valid:false,raw:rawYear||''};
  let m;
  if(m=y.match(/^(\d{2,3})\s*學測$/))return {aca:m[1],term:'學測',valid:true,raw:y};
  if(m=y.match(/^(\d{2,3})\s*分科測驗$/))return {aca:m[1],term:'分科測驗',valid:true,raw:y};
  if(m=y.match(/^(\d{2,3})\s*會考$/))return {aca:m[1],term:'會考',valid:true,raw:y};
  if(m=y.match(/^(\d{2,3})[-－]?\s*上(學期)?$/))return {aca:m[1],term:'上',valid:true,raw:y};
  if(m=y.match(/^(\d{2,3})[-－]?\s*下(學期)?$/))return {aca:m[1],term:'下',valid:true,raw:y};
  if(m=y.match(/^(\d{2,3})$/))return {aca:m[1],term:examTypeC||'未辨識',valid:true,raw:y};
  return {aca:null,term:null,valid:false,raw:y};
}

function normType(t){
  if(t==null)return '';t=(''+t).trim();
  if(!t)return '';
  for(const x of QTYPES){if(t===x.code||t===x.name||t===x.code+' '+x.name||t===x.code+x.name)return x.code;}
  const m=t.match(/^([A-E][1-3]|填|計)(?=\s|$|[一-鿿])/);
  return m?m[1]:t;
}
function qtypeInfo(code){return QTYPES.find(x=>x.code===code)||null;}
function bookToGrade(book){
  book=book||'';
  if(book==='JB1'||book==='JB2'||book==='B1'||book==='B2')return '七年級';
  if(book==='JB3'||book==='JB4'||book==='B3'||book==='B4')return '八年級';
  if(book==='JB5'||book==='JB6'||book==='B5'||book==='B6')return '九年級';
  if(HS_BOOKS.includes(book))return '高中';
  return '';
}
function gradeFromExam(exam,book){
  exam=exam||'';
  if(exam){
    if(exam.includes('九年級')||exam.includes('國三'))return '九年級';
    if(exam.includes('八年級')||exam.includes('國二'))return '八年級';
    if(exam.includes('七年級')||exam.includes('國一'))return '七年級';
    if(exam.includes('高一'))return '高一';
    if(exam.includes('高二'))return '高二';
    if(exam.includes('高三'))return '高三';
    if(exam.includes('高中')||exam.includes('學測')||exam.includes('分科測驗'))return '高中';
  }
  return bookToGrade(book);
}
function schoolLevelOf(grade){return ['七年級','八年級','九年級'].includes(grade)?'國中':(grade?'高中':'');}
function examTypeOf(exam,school){
  exam=exam||'';
  if(!exam)return '';
  if(exam.includes('段考'))return '段考';
  if(exam.includes('模擬')||exam.includes('北模')||exam.includes('全模'))return '模擬考';
  if(exam.includes('會考'))return '會考';
  if(exam.includes('學測'))return '學測';
  if(exam.includes('分科測驗'))return '分科測驗';
  if(school||/國[中小]|高[中職]/.test(exam))return '段考';
  return '其他';
}
function calcDiffLvl(s,m,c){
  s=+s||0;m=+m||0;c=+c||0;

}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function pct(n,d){return d?((n/d*100).toFixed(1)):'0.0';}

// ---------- 圖表小工具（純 SVG，無外部套件） ----------
const CHART_COLORS=['#850103','#f9a12c','#3454b4','#1f6f5c','#af9a6b','#c2694a','#6e6f74','#8a5fb0','#2a8f8f','#b23b3b'];
let _uid=0;
function donutSVG(pairs,size,strokeW,centerLabel){
  size=size||150;strokeW=strokeW||24;
  const total=pairs.reduce((s,[,v])=>s+v,0)||1;
  const R=(size-strokeW)/2,C=2*Math.PI*R,cx=size/2,cy=size/2;
  let offset=0;
  const segs=pairs.map(([label,val],i)=>{
    const frac=val/total;
    const dash=Math.max(frac*C-(pairs.length>1?1.5:0),0);
    const el=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${CHART_COLORS[i%CHART_COLORS.length]}" stroke-width="${strokeW}" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=frac*C;
    return el;
  }).join('');
  const center=centerLabel?`<text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="20" font-weight="800" fill="var(--ink)">${centerLabel.n}</text><text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${esc(centerLabel.lbl)}</text>`:'';
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${segs}${center}</svg>`;
}
function legendHTML(pairs,total,opts){
  opts=opts||{};
  return pairs.map(([label,val],i)=>{
    const color=CHART_COLORS[i%CHART_COLORS.length];
    const id=opts.idPrefix?`${opts.idPrefix}-${i}`:'';
    const clickable=opts.drillKeys&&opts.drillKeys[i];

    return `<div class="legend-item${clickable?' clickable':''}" id="${id?'leg-'+id:''}" ${onclick}>
      <span class="legend-dot" style="background:${color}"></span>
      <span class="lname" title="${esc(label)}">${esc(label)}</span>
      <span class="lval">${val}（${pct(val,total)}%）</span>
      ${clickable?'<span class="lchevron">▶</span>':''}
    </div>
    ${clickable?`<div class="drill-panel" id="drill-${id}">${clickable}</div>`:''}`;
  }).join('');
}
function toggleDrill(id){
  const panel=document.getElementById('drill-'+id);

function stackBarHTML(pairs,total){
  const legend=pairs.map(([label,val],i)=>{
    const color=CHART_COLORS[i%CHART_COLORS.length];
    return `<span><i style="background:${color}"></i>${esc(label)} ${val}（${pct(val,total)}%）</span>`;
  }).join('');
  const bar=pairs.map(([label,val],i)=>{

  return `<div class="stack-bar">${bar}</div><div class="stack-legend">${legend}</div>`;
}
function lineSVG(pairs,h){
  h=h||170;
  const pad=34,padR=16;
  const n=pairs.length;
  const w=Math.max(360,n*70);
  const maxV=Math.max(...pairs.map(p=>p[1]),1);
  const stepX=n>1?(w-pad-padR)/(n-1):0;
  const pts=pairs.map(([,v],i)=>{
    const x=pad+i*stepX;
    const y=h-pad-(v/maxV)*(h-pad-16);
    return [x,y];
  });
  const path=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath=path+` L${pts[n-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const dots=pts.map(([x,y],i)=>`
    <circle cx="${x}" cy="${y}" r="4" fill="var(--red)" stroke="#fff" stroke-width="1.5"/>
    <text x="${x}" y="${y-10}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink)">${pairs[i][1]}</text>
    <text x="${x}" y="${h-pad+18}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${esc(pairs[i][0])}</text>`).join('');
  return `<div class="line-chart-wrap"><svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
    <line x1="${pad}" y1="${h-pad}" x2="${w-padR}" y2="${h-pad}" stroke="var(--line)" stroke-width="1"/>
    <path d="${areaPath}" fill="var(--red)" opacity=".06"/>
    <path d="${path}" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg></div>`;
}

function ppFmt(v){return (v>=0?'+':'−')+Math.abs(v).toFixed(1)+'pp';}
// 考卷加權：每份考卷先算內部比例，再對考卷取平均（每份考卷權重相同）；回傳 {key:比例0~1}
function examWeightedDist(rows,keyFn){
  const byExam={};
  rows.forEach(r=>{const e=r.exam||'（未命名考卷）';(byExam[e]=byExam[e]||[]).push(r);});
  const exams=Object.keys(byExam);
  if(!exams.length)return {};
  const sums={};
  exams.forEach(e=>{
    const list=byExam[e];
    const local={};
    list.forEach(r=>{const k=keyFn(r);local[k]=(local[k]||0)+1;});
    Object.keys(local).forEach(k=>{sums[k]=(sums[k]||0)+local[k]/list.length;});
  });
  const out={};
  Object.keys(sums).forEach(k=>out[k]=sums[k]/exams.length);
  return out;
}
// 題目加權：直接算比例
function qWeightedDist(rows,keyFn){
  const total=rows.length||1,m={};
  rows.forEach(r=>{const k=keyFn(r);m[k]=(m[k]||0)+1;});
  const out={};
  Object.keys(m).forEach(k=>out[k]=m[k]/total);
  return out;
}
function weightedDist(rows,keyFn,weight){return weight==='exam'?examWeightedDist(rows,keyFn):qWeightedDist(rows,keyFn);}

function sortableTable(id,columns,rows,opts){
  opts=opts||{};
  const state=_dtState[id]=_dtState[id]||{col:opts.defaultCol||0,dir:opts.defaultDir||'desc'};
  const sorted=[...rows].sort((a,b)=>{
    const col=columns[state.col];
    let va=col.sortVal?col.sortVal(a):a[col.key],vb=col.sortVal?col.sortVal(b):b[col.key];
    if(typeof va==='string')return state.dir==='asc'?String(va).localeCompare(String(vb),'zh-Hant'):String(vb).localeCompare(String(va),'zh-Hant');
    return state.dir==='asc'?va-vb:vb-va;
  });
  const thead=columns.map((c,i)=>`<th class="${c.num?'num ':''}${state.col===i?'sorted '+state.dir:''}" onclick="_dtSort('${id}',${i})">${esc(c.label)}</th>`).join('');
  const tbody=sorted.map(row=>{
    const cells=columns.map(c=>`<td class="${c.num?'num':''}${c.warnFn&&c.warnFn(row)?' warn':''}">${c.render?c.render(row):esc(row[c.key])}</td>`).join('');
    const click=opts.onRowClick?` class="clickable" onclick='${opts.onRowClick}(${JSON.stringify(opts.rowKey?opts.rowKey(row):row).replace(/'/g,"&#39;")})'`:'';
    return `<tr${click}>${cells}</tr>`;
  }).join('');
  return `<div class="dt-wrap"><table class="dt" id="dt-${id}"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}
const _dtState={};
function _dtSort(id,i){
  const st=_dtState[id];
  if(st.col===i)st.dir=st.dir==='asc'?'desc':'asc';

}

function heatColor(p){
  // p: 0~1，白到紅漸層
  const t=Math.min(1,p*3.2);
  const r=Math.round(255-(255-133)*t),g=Math.round(250-(250-2)*t),b=Math.round(245-(245-3)*t);
  return `rgb(${r},${g},${b})`;
}
function heatmapTable(rowLabels,colLabels,valueFn,opts){
  opts=opts||{};
  const head='<th class="rowhead"></th>'+colLabels.map(c=>`<th>${esc(c)}</th>`).join('');
  const body=rowLabels.map(rl=>{
    const cells=colLabels.map(cl=>{
      const v=valueFn(rl,cl);
      if(!v||!v.n)return '<td class="empty">–</td>';
      const bg=heatColor(v.p);
      const click=opts.onClick?` onclick='${opts.onClick}(${JSON.stringify({row:rl,col:cl}).replace(/'/g,"&#39;")})'`:'';
      const title=`${rl} / ${cl}：${v.n} 題（${(v.p*100).toFixed(1)}%）${v.examN?'，'+v.examN+' 份考卷':''}${v.diff!=null?'，較前一年 '+ppFmt(v.diff):''}`;
      return `<td style="background:${bg}" title="${esc(title)}"${click}><div class="n">${v.n}</div><div class="p">${(v.p*100).toFixed(1)}%</div></td>`;
    }).join('');
    return `<tr><th class="rowhead" title="${esc(rl)}">${esc(rl)}</th>${cells}</tr>`;
  }).join('');
  return `<div class="heat-wrap"><table class="heat"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

// 每筆題目對應到章節樹的路徑，每一段帶課綱順序 ord：領域 → [高中必修/選修分組] → 冊次 → 大單元 → 子單元
function chapterRowSegs(r){
  const isHS=r.level==='高中';
  const field=r.field||'（未分類領域）';
  const unit=r.unit||'（未分大單元）';
  const sub=r.sub||'（未分子單元）';
  const segs=[{label:field,ord:syllabusIdx(isHS?HS_FIELDS:JH_FIELDS,field)}];
  if(isHS){
    const book=r.book||r.book_name||'（未分冊）';
    const m=book.match(/^選修(.+?)([一二三四五])$/);
    if(m){
      segs.push({label:'選修'+m[1],ord:1}); // 必修=0、選修=1
      segs.push({label:book,ord:'一二三四五'.indexOf(m[2])});
    }else{
      segs.push({label:book,ord:book.startsWith('必修')?0:2});
    }
    segs.push({label:unit,ord:syllabusIdx(SYL_UNIT_LIST[book],unit)});
    segs.push({label:sub,ord:syllabusIdx(SYL_SUB_LIST[book+unit],sub)});
  }else{
    const bk=r.book_name||r.book||'（未分冊）';
    segs.push({label:bk,ord:syllabusIdx(SYL_BOOK_ORDER_JH,bk)});
    segs.push({label:unit,ord:syllabusIdx(SYL_UNIT_LIST[bk],unit)});
    segs.push({label:sub,ord:syllabusIdx(SYL_SUB_LIST[bk+unit],sub)});
  }
  return segs;
}

function buildPathTree(rows){
  const root={children:{},count:0};
  rows.forEach(r=>{
    root.count++;
    let node=root;
    chapterRowSegs(r).forEach(seg=>{
      if(!node.children[seg.label])node.children[seg.label]={children:{},count:0,ord:seg.ord};
      node=node.children[seg.label];
      node.count++;
      if(seg.ord<node.ord)node.ord=seg.ord; // 取最小 ord（同一節點多次出現時）
    });
  });
  return root;
}

function setCovLevel(v){_covLevel=v;render();}

function covExpandAll(open){document.querySelectorAll('#nav-coverage .covtree details').forEach(d=>d.open=open);}
// 子樹是否命中搜尋（名稱或任一後代名稱包含關鍵字）
function covMatch(node,key,name){
  if(!key)return true;
  if(String(name).includes(key))return true;
  return Object.keys(node.children).some(k=>covMatch(node.children[k],key,k));
}
// 遞迴渲染折疊樹；每個非葉節點都是 <details>，depth < 展開層數 或 有搜尋命中時預設展開
function renderCovNode(node,depth,grandTotal){
  const key=_covSearch;
  const openDepth=_COV_DEPTH[_covLevel]; // depth<openDepth 的層預設展開
  const keys=Object.keys(node.children).filter(k=>covMatch(node.children[k],key,k)).sort((a,b)=>{
    const oa=node.children[a].ord,ob=node.children[b].ord;
    if(oa!==ob)return oa-ob;
    return naturalCmp(a,b);
  });
  return keys.map(k=>{
    const child=node.children[k];
    const hasKids=Object.keys(child.children).length>0;
    const cnt=`${child.count} 題（${pct(child.count,grandTotal)}%）`;
    if(!hasKids){
      const low=child.count<3;
      return `<div class="leaf" style="padding-left:${depth*16+6}px"><span class="nm">${esc(k)}${low?'<span class="low">低覆蓋</span>':''}</span><span class="cnt">${cnt}</span></div>`;
    }
    // 大單元摘要：其中幾個子單元 <3 題（只在大單元層顯示，不逐項轟炸）
    let extra='';
    const grandkidsAreLeaves=Object.values(child.children).every(c=>Object.keys(c.children).length===0);
    if(grandkidsAreLeaves){
      const low=Object.values(child.children).filter(s=>s.count<3).length;
      if(low)extra=`<span class="unitwarn">・${low} 個子單元 &lt;3 題</span>`;
    }
    const open=(depth<openDepth)||!!key; // 有搜尋時全展開命中路徑
    return `<details${open?' open':''}><summary><span class="tw">▶</span><span class="nm">${esc(k)}${extra}</span><span class="cnt">${cnt}</span></summary><div class="kids">${renderCovNode(child,depth+1,grandTotal)}</div></details>`;
  }).join('');
}

// 教材骨架覆蓋率：已出現的標準子單元數 / 該學制骨架全部子單元數
function skeletonCoverage(rows,level){
  const covered=new Set();
  rows.forEach(r=>{if(r.stdChapter){covered.add(dbBookKey(r)+'|'+r.unit+'|'+r.sub);}});
  const books=level==='國中'?SYL_BOOK_ORDER_JH:SYL_BOOK_ORDER_HS;
  let totalSub=0;
  books.forEach(bk=>{(SYL_UNIT_LIST[bk]||[]).forEach(u=>{totalSub+=(SYL_SUB_LIST[bk+u]||[]).length;});});
  return {covered:covered.size,total:totalSub};
}

function coverageBlock(label,level,rows){
  const std=rows.filter(r=>r.stdChapter);
  const nonStd=rows.filter(r=>!r.stdChapter);
  const tree=buildPathTree(std);
  const treeHtml=std.length?`<div class="covtree">${renderCovNode(tree,0,std.length)}</div>`:'<div class="empty-note" style="padding:14px">此範圍沒有符合教材骨架的章節。</div>';
  const cov=skeletonCoverage(rows,level);
  // 待正規化章節（非標準）：依 冊次｜大單元｜子單元 聚合
  let nonStdHtml='';
  if(nonStd.length){
    const agg={};
    nonStd.forEach(r=>{const k=`${dbBookKey(r)||'（未分冊）'}｜${r.unit||'（未分大單元）'}｜${r.sub||'（未分子單元）'}`;agg[k]=(agg[k]||0)+1;});
    const list=Object.entries(agg).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<div class="leaf" style="padding-left:6px"><span class="nm">${esc(k)}</span><span class="cnt">${n} 題</span></div>`).join('');
    nonStdHtml=`<details class="nonstd-box"><summary>⚠ 待正規化章節（非標準／舊格式／跨章）：${nonStd.length} 題，未納入骨架覆蓋率分母，點開檢視</summary>${list}</details>`;
  }
  return `<div class="chapter-level">
    <div class="split-label">${esc(label)}<span class="split-n">${rows.length} 題</span></div>
    <div class="cov-rate">教材骨架覆蓋率：<b>${cov.covered}</b> / ${cov.total} 個子單元（${pct(cov.covered,cov.total)}%）　·　標準章節 ${std.length} 題、待正規化 ${nonStd.length} 題</div>
    ${treeHtml}
    ${nonStdHtml}
  </div>`;
}

function buildChapterMap(rows){
  const {jh,hs,other}=splitByLevel(rows);
  const blocks=[];
  if(jh.length)blocks.push(coverageBlock('國中','國中',jh));
  if(hs.length)blocks.push(coverageBlock('高中','高中',hs));
  if(other.length){
    // 未標示學制：全部視為待正規化，直接列出
    const agg={};
    other.forEach(r=>{const k=`${esc(r.field||'?')}｜${dbBookKey(r)||'（未分冊）'}｜${r.unit||'（未分大單元）'}｜${r.sub||'（未分子單元）'}`;agg[k]=(agg[k]||0)+1;});
    const list=Object.entries(agg).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<div class="leaf" style="padding-left:6px"><span class="nm">${k}</span><span class="cnt">${n} 題</span></div>`).join('');
    blocks.push(`<div class="chapter-level"><div class="split-label">（未標示學制）<span class="split-n">${other.length} 題</span></div><details class="nonstd-box" open><summary>⚠ 這些題目無法判定學制，全部列為待正規化</summary>${list}</details></div>`);
  }
  if(!blocks.length)return '';
  const levelSel=[['field','領域'],['book','冊次'],['unit','大單元'],['sub','子單元']];
  const tools=`<div class="cov-tools">
    <span style="font-size:11.5px;font-weight:700;color:var(--muted)">展開至：</span>
    ${levelSel.map(([v,n])=>`<button class="scope-btn${_covLevel===v?' active':''}" style="padding:4px 12px" onclick="setCovLevel('${v}')">${n}</button>`).join(' ')}
    <button class="scope-btn" style="padding:4px 12px" onclick="covExpandAll(true)">全部展開</button>
    <button class="scope-btn" style="padding:4px 12px" onclick="covExpandAll(false)">全部收合</button>
    <input type="text" placeholder="搜尋章節…" value="${esc(_covSearch)}" oninput="covSearchInput(this.value)">
  </div>`;
  return `<div class="section"><h2>📚 章節覆蓋地圖（目前庫存）</h2>
    <div class="desc">看目前題庫的章節庫存與缺題；預設只展開到領域，逐層點開。只計入符合教材骨架的標準章節；非標準／舊格式章節收在「待正規化」群組，不計入覆蓋率分母。年度間的章節變化請看上方「年度章節編排變化」。</div>
    ${tools}${blocks.join('')}
  </div>`;
}

function barList(pairs,total,warnBelow){
  return pairs.map(([label,count])=>{
    const w=Math.max(1,count/total*100);
    const warn=warnBelow!=null&&count<=warnBelow;
    return `<div class="bar-row${warn?' warn':''}"><div class="lbl" title="${esc(label)}">${esc(label)}</div><div class="bar-wrap"><div class="bar-fill" style="width:${w}%"></div></div><div class="val">${count}（${pct(count,total)}%）</div></div>`;
  }).join('');
}

function fieldDistBlock(label,rows){
  const total=rows.length;
  const counts={};
  rows.forEach(r=>{const f=r.field||'（未分類）';counts[f]=(counts[f]||0)+1;});
  const pairs=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  return `<div class="split-half">
    <div class="split-label">${esc(label)}<span class="split-n">${total} 題</span></div>
    <div class="donut-flex">
      ${donutSVG(pairs,130,22,{n:total,lbl:'題'})}
      <div class="legend">${legendHTML(pairs,total)}</div>
    </div>
  </div>`;
}

function buildFieldDist(rows){
  const {jh,hs,other}=splitByLevel(rows);
  const parts=[];
  if(jh.length)parts.push(fieldDistBlock('國中',jh));
  if(hs.length)parts.push(fieldDistBlock('高中',hs));
  if(other.length)parts.push(fieldDistBlock('（未標示學制）',other));
  if(!parts.length)return '';
  return `<div class="section"><h2>科別／領域分布</h2><div class="desc">國中（生物／理化／地科）與高中（物理／化學／生物／地科）分開統計，避免混在一起看不出各自比例是否失衡。</div>
    <div class="split-two">${parts.join('')}</div>
  </div>`;
}

function buildTypeDist(rows,inner){
  const total=rows.length;
  const byGroup={},groupItems={};
  rows.forEach(r=>{
    const info=qtypeInfo(r.typeCode);
    const g=info?info.group:'（未分類／舊格式）';
    byGroup[g]=(byGroup[g]||0)+1;
    (groupItems[g]=groupItems[g]||[]).push(r);
  });
  const groupPairs=Object.entries(byGroup).sort((a,b)=>b[1]-a[1]);
  const drillKeys=groupPairs.map(([g])=>{
    const sub=groupItems[g];
    const byCode={};
    sub.forEach(r=>{
      const info=qtypeInfo(r.typeCode);
      const label=info?`${info.code} ${info.name}`:(r.typeCode||'（未分類）');
      byCode[label]=(byCode[label]||0)+1;
    });
    const codePairs=Object.entries(byCode).sort((a,b)=>b[1]-a[1]);
    return barList(codePairs,sub.length);
  });
  const body=`<div class="desc">整體題型結構：是否幾乎都是概念題，缺圖表、實驗或素養情境題。點大類可展開細項。</div>
    <div class="donut-flex">
      ${donutSVG(groupPairs,150,26,{n:total,lbl:'題'})}
      <div class="legend">${legendHTML(groupPairs,total,{idPrefix:'type',drillKeys})}</div>
    </div>`;
  if(inner)return body;
  return `<div class="section"><h2>題型分布 <span class="qtag">A～E 大類，點大類看細項</span></h2>${body}</div>`;
}

function buildChartDist(rows,inner){
  // 只用固定 12 類（含「無」）；未填／無效不進此圖，改列資料品質
  const valid=rows.filter(r=>r.chartValid);
  const invalidN=rows.length-valid.length;
  const onlyImg=_chartBase==='img';
  const base=onlyImg?valid.filter(r=>r.chartC!=='無'):valid;
  const cats=CHART_CATS.filter(c=>onlyImg?c!=='無':true);
  const counts={};cats.forEach(c=>counts[c]=0);
  base.forEach(r=>{counts[r.chartC]=(counts[r.chartC]||0)+1;});
  const pairs=cats.map(c=>[c,counts[c]]).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total=base.length||1;
  const toggle=`<div style="margin-bottom:10px">底數：<button class="scope-btn${_chartBase==='all'?' active':''}" style="padding:4px 12px" onclick="setChartBase('all')">占全部題目</button> <button class="scope-btn${onlyImg?' active':''}" style="padding:4px 12px" onclick="setChartBase('img')">只看有圖題</button></div>`;
  const body=`<div class="desc">固定 12 類圖表素材覆蓋度（含「無」）。未填／無效值不列入此圖${invalidN?`（另有 <b>${invalidN}</b> 題未填／無效，見資料品質）`:''}。</div>
    ${toggle}
    <div class="donut-flex">
      ${donutSVG(pairs,150,26,{n:base.length,lbl:'題'})}
      <div class="legend">${legendHTML(pairs,total)}</div>
    </div>`;
  if(inner)return body;
  return `<div class="section"><h2>圖表類型分布</h2>${body}</div>`;
}

function buildDifficulty(rows,inner){
  const total=rows.length;
  const order=['簡單','中等','困難','極難','未評分'];
  const counts={};
  rows.forEach(r=>{counts[r.diffLvl]=(counts[r.diffLvl]||0)+1;});
  const pairs=order.filter(k=>counts[k]).map(k=>[k,counts[k]]);
  function scoreHist(field,label){
    const h={};
    rows.forEach(r=>{const v=+r[field]||0;h[v]=(h[v]||0)+1;});
    const keys=Object.keys(h).map(Number).sort((a,b)=>a-b);
    const pairs2=keys.map(k=>[label+' = '+k,h[k]]);
    return barList(pairs2,total);
  }
  const body=`<div class="desc">整體難度分布（步驟分+記憶分+概念分，三項有一項為 0 視為未評分）：</div>
    ${stackBarHTML(pairs,total)}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px">步驟分分布</div>${scoreHist('step','步驟分')}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px">記憶分分布</div>${scoreHist('mem','記憶分')}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px">概念分分布</div>${scoreHist('con','概念分')}`;
  if(inner)return body;
  return `<div class="section"><h2>難度結構</h2>${body}</div>`;
}

function buildSourceYear(rows){
  const total=rows.length;
  const bySchool={};
  rows.forEach(r=>{const s=r.school||'（未填）';bySchool[s]=(bySchool[s]||0)+1;});
  const schoolPairs=Object.entries(bySchool).sort((a,b)=>b[1]-a[1]).slice(0,12);
  // 年度題源偏差表
  const yc=getYearCtrl();
  const yrows=yearScopedRows(rows,yc);
  const keys=sortedYearKeys(yrows);
  const byYear={};keys.forEach(k=>byYear[k]=[]);yrows.forEach(r=>byYear[r._yk].push(r));
  const OFFICIAL=['會考','學測','分科測驗','模擬考'];
  const biasRows=keys.map(k=>{
    const list=byYear[k];const n=list.length;
    const sc={};list.forEach(r=>{const s=(r.school||'').trim();if(s)sc[s]=(sc[s]||0)+1;});
    const scPairs=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
    const maxShare=scPairs.length?scPairs[0][1]/n:0;
    const top3=scPairs.slice(0,3).reduce((s,[,v])=>s+v,0)/n;
    const official=list.filter(r=>OFFICIAL.includes(r.examTypeC)).length/n;
    const noSrc=list.filter(r=>!(r.school||'').trim()&&!OFFICIAL.includes(r.examTypeC)).length/n;
    return {yk:k,schoolN:scPairs.length,maxShare,top3,official,noSrc,concentrated:maxShare>0.6};
  });
  const cols=[
    {label:'年度',key:'yk',sortVal:r=>parseInt(r.yk)},
    {label:'來源學校數',key:'schoolN',num:true},
    {label:'最大來源校占比',key:'maxShare',num:true,warnFn:r=>r.concentrated,render:r=>(r.maxShare*100).toFixed(1)+'%'+(r.concentrated?' ⚠':'')},
    {label:'前 3 校占比',key:'top3',num:true,render:r=>(r.top3*100).toFixed(1)+'%'},
    {label:'官方試題占比',key:'official',num:true,render:r=>(r.official*100).toFixed(1)+'%'},
    {label:'未填來源占比',key:'noSrc',num:true,render:r=>(r.noSrc*100).toFixed(1)+'%'},
  ];
  const biasTable=biasRows.length?sortableTable('srcBias',cols,biasRows,{defaultCol:0,defaultDir:'asc'}):'<div class="empty-note">目前範圍沒有可辨識年度的題源資料</div>';
  const invalidYear=rows.filter(r=>!r.yr.valid).length;
  return `<div class="section"><h2>🏫 題源偏差</h2>${ycNote(yc)}
    <div class="desc">判斷某年度題目是否過度集中於單一學校，或某年結構變化其實只是因某校大量匯入。官方試題＝會考／學測／分科測驗／模擬考。最大來源校占比 &gt;60% 標警示。${invalidYear?`另有 ${invalidYear} 題年度無法辨識，未列入。`:''}</div>
    ${biasTable}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 6px">來源學校（整體前 12）</div>
    ${barList(schoolPairs,total)}
  </div>`;
}

function distMap(rows,keyFn){
  const total=rows.length,m={};
  rows.forEach(r=>{const k=keyFn(r);m[k]=(m[k]||0)+1;});
  const out={};
  Object.keys(m).forEach(k=>out[k]=m[k]/total);
  return out;
}
function cmpRow(label,thisMap,baseMap,key){
  const a=(thisMap[key]||0)*100,b=(baseMap[key]||0)*100;
  const mx=Math.max(a,b,1);
  return `<div class="cmp-row"><div class="lbl" title="${esc(label)}">${esc(label)}</div>
    <div class="cmp-bars">
      <div class="cmp-line this"><span class="tag">本卷</span><div class="bar-wrap"><div class="bar-fill" style="width:${a/mx*100}%"></div></div></div>
      <div class="cmp-line base"><span class="tag">對照</span><div class="bar-wrap"><div class="bar-fill" style="width:${b/mx*100}%"></div></div></div>
    </div>
    <div class="pct">${a.toFixed(1)}% / ${b.toFixed(1)}%</div>
  </div>`;
}
function buildComparisonIfSingleExam(rows){
  if(scopeMode!=='picked')return '';
  const exams=new Set(rows.map(r=>r.exam).filter(Boolean));
  if(exams.size!==1)return '';
  const examName=[...exams][0];
  const baseRows=getComparisonRows();
  if(!baseRows.length)return '';

  const unitThis=distMap(rows,r=>r.unit||'（未分類）');
  const unitBase=distMap(baseRows,r=>r.unit||'（未分類）');
  const topUnits=Object.entries(unitThis).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([u])=>u);

  const chartThis=distMap(rows,r=>r.chartC==='無'?'無圖':'有圖');
  const chartBase=distMap(baseRows,r=>r.chartC==='無'?'無圖':'有圖');

  const diffThis=distMap(rows,r=>r.diffLvl);
  const diffBase=distMap(baseRows,r=>r.diffLvl);

  const groupThis=distMap(rows,r=>r.hasGroup?'題組':'單題');
  const groupBase=distMap(baseRows,r=>r.hasGroup?'題組':'單題');

  const typeGroupThis=distMap(rows,r=>{const info=qtypeInfo(r.typeCode);return info?info.group:'（未分類）';});
  const typeGroupBase=distMap(baseRows,r=>{const info=qtypeInfo(r.typeCode);return info?info.group:'（未分類）';});

  // 自動提示：找出落差最大的 1-2 個章節、有圖比例、記憶分=1 比例
  const insights=[];
  const unitGapSorted=topUnits.map(u=>({u,gap:(unitThis[u]||0)-(unitBase[u]||0)})).sort((a,b)=>Math.abs(b.gap)-Math.abs(a.gap));
  if(unitGapSorted.length){
    const top=unitGapSorted[0];
    const dir=top.gap>0?'高於':'低於';
    insights.push(`「${esc(top.u)}」占本卷 ${( (unitThis[top.u]||0)*100 ).toFixed(0)}%，${dir}對照範圍的 ${((unitBase[top.u]||0)*100).toFixed(0)}%`);
  }
  const hasChartThis=(chartThis['有圖']||0)*100, hasChartBase=(chartBase['有圖']||0)*100;
  insights.push(`圖表題占 ${hasChartThis.toFixed(1)}%，${hasChartThis<hasChartBase?'低於':'高於或持平於'}對照範圍的 ${hasChartBase.toFixed(1)}%${hasChartThis<hasChartBase?'，建議補入圖表判讀／計算題':''}`);
  const mem1Rate=rows.filter(r=>+r.mem===1).length/rows.length*100;
  const mem1Base=baseRows.filter(r=>+r.mem===1).length/baseRows.length*100;
  if(mem1Rate>mem1Base){
    insights.push(`記憶分為 1（偏背誦）的題目占 ${mem1Rate.toFixed(0)}%，高於對照範圍的 ${mem1Base.toFixed(0)}%，建議補入概念推論或情境題`);
  }
  const pendRate=rows.filter(r=>r.flag).length/rows.length*100;
  if(pendRate>0)insights.push(`本卷待確認題占 ${pendRate.toFixed(0)}%，建議先複核再組卷使用`);

  return `<div class="section">
    <h2>📊 單卷比較報告 <span class="qtag">${esc(examName)}</span></h2>
    <div class="desc">本卷共 ${rows.length} 題，與目前對照範圍（${baseRows.length} 題）比較：</div>
    <div class="insight-box">${insights.map(t=>'・'+t).join('<br>')}</div>
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">章節比例（前 6）</div>
    ${topUnits.map(u=>cmpRow(u,unitThis,unitBase,u)).join('')}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 8px">題型大類比例</div>
    ${Object.keys(typeGroupThis).map(g=>cmpRow(g,typeGroupThis,typeGroupBase,g)).join('')}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 8px">圖表使用比例</div>
    ${cmpRow('有圖',chartThis,chartBase,'有圖')}${cmpRow('無圖',chartThis,chartBase,'無圖')}
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 8px">難度／認知層次比例</div>
    ${Object.keys(diffThis).map(d=>cmpRow(d,diffThis,diffBase,d)).join('')}

function ycNote(yc){
  const bits=[];
  bits.push(yc.granularity==='split'?'上／下學期分開':'年度合併');
  bits.push(yc.weight==='exam'?'考卷加權':'題目加權');
  bits.push({count:'題數',pct:'年度內比例',diff:'與前一年差異(pp)'}[yc.display]);
  if(yc.level)bits.push('僅'+yc.level);
  if(yc.hideLow)bits.push('隱藏樣本不足年度');
  return `<span class="badge" title="年度圖表顯示設定（可於頁首控制列 B 調整）" style="margin-bottom:8px">${bits.join('　·　')}</span>`;
}
function lowExamWarn(ykRows){
  const examN=new Set(ykRows.map(r=>r.exam).filter(Boolean)).size;
  return examN>0&&examN<5?`此年度僅收錄 ${examN} 份考卷，趨勢僅供參考。`:'';
}

function ycRowJump(o){

// 通用：年度 × 分類 100% 堆疊長條（支援 題數/比例/前一年差異）
function yearStackSection(title,desc,rows,catFn,catOrder,opts){
  opts=opts||{};
  const yc=getYearCtrl();
  const yrows=yearScopedRows(rows,yc).filter(r=>!opts.levelFilter||r.level===opts.levelFilter);
  if(!yrows.length)return '';
  const keys=sortedYearKeys(yrows);
  const byYear={};keys.forEach(k=>byYear[k]=[]);
  yrows.forEach(r=>byYear[r._yk].push(r));
  // 每年各分類的比例
  const dists={};keys.forEach(k=>dists[k]=weightedDist(byYear[k],catFn,yc.weight));
  const cats=(catOrder&&catOrder.length)?catOrder.filter(c=>keys.some(k=>dists[k][c]>0)):Array.from(new Set(keys.flatMap(k=>Object.keys(dists[k]))));
  const colorOf=c=>CHART_COLORS[cats.indexOf(c)%CHART_COLORS.length];
  const legend=cats.map(c=>`<span><i style="background:${colorOf(c)}"></i>${esc(c)}</span>`).join('');
  const bars=keys.map((k,ki)=>{
    const list=byYear[k];
    const examN=new Set(list.map(r=>r.exam).filter(Boolean)).size;
    const dist=dists[k];
    let inner;
    if(yc.display==='diff'){
      const prev=ki>0?dists[keys[ki-1]]:null;
      inner=cats.map(c=>{
        const cur=(dist[c]||0)*100;
        if(!prev)return `<span style="display:inline-flex;align-items:center;gap:3px;margin:0 8px 3px 0;font-size:11px"><i style="width:9px;height:9px;border-radius:2px;background:${colorOf(c)};display:inline-block"></i>${esc(c)} —</span>`;
        const d=cur-(prev[c]||0)*100;
        return `<span style="display:inline-flex;align-items:center;gap:3px;margin:0 8px 3px 0;font-size:11px"><i style="width:9px;height:9px;border-radius:2px;background:${colorOf(c)};display:inline-block"></i>${esc(c)} <b class="${d>=0?'pp-up':'pp-down'}">${ppFmt(d)}</b></span>`;
      }).join('');
      return `<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:700;margin-bottom:2px">${esc(k)}${examN<5?` <span style="color:#b23b3b;font-weight:500">（${examN}卷，僅供參考）</span>`:''}</div><div>${inner}</div></div>`;
    }
    const segs=cats.map(c=>{
      const p=dist[c]||0;
      const w=yc.display==='count'?0:p*100;
      return {c,p,n:list.filter(r=>catFn(r)===c).length};
    });
    if(yc.display==='count'){
      const maxN=Math.max(...keys.map(kk=>byYear[kk].length),1);
      const totalN=list.length;
      inner=`<div class="stack-bar" style="width:${Math.max(8,totalN/maxN*100)}%" title="${esc(k)}：${totalN} 題">`+segs.map(s=>s.n>0?`<div style="width:${s.n/totalN*100}%;background:${colorOf(s.c)}" title="${esc(s.c)}：${s.n} 題">${s.n/totalN>=0.1?s.n:''}</div>`:'').join('')+`</div>`;
    }else{
      inner=`<div class="stack-bar" title="${esc(k)}：${list.length} 題／${examN} 卷">`+segs.map(s=>s.p>0?`<div style="width:${s.p*100}%;background:${colorOf(s.c)}" title="${esc(s.c)}：${s.n} 題（${(s.p*100).toFixed(1)}%）">${s.p>=0.08?(s.p*100).toFixed(0)+'%':''}</div>`:'').join('')+`</div>`;
    }
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div style="width:70px;flex-shrink:0;font-size:12px;font-weight:700">${esc(k)}</div><div style="flex:1">${inner}</div><div style="width:110px;flex-shrink:0;font-size:11px;color:var(--muted);text-align:right">${list.length}題／${examN}卷${examN<5?' ⚠':''}</div></div>`;
  }).join('');
  return `<div style="margin-bottom:6px">
    <div style="font-size:12.5px;font-weight:800;color:var(--red);margin-bottom:8px">${esc(title)}</div>
    ${desc?`<div class="desc">${desc}</div>`:''}
    <div class="stack-legend" style="margin-bottom:10px">${legend}</div>
    ${bars}
  </div>`;
}

// B. 年度章節編排變化（熱度圖 + 變動榜 + 集中度）
let _chapLevel='unit';
function setChapLevel(v){_chapLevel=v;render();}
function buildYearChapter(rows){
  const yc=getYearCtrl();
  const yrows=yearScopedRows(rows,yc);
  if(!yrows.length)return '';
  const levelSel=['field','book','unit','sub'];
  const levelName={field:'領域',book:'冊次',unit:'大單元',sub:'子單元'};
  const catFn=r=>({field:r.field||'（未分領域）',book:dbBookKey(r)||'（未分冊）',unit:r.unit||'（未分大單元）',sub:r.sub||'（未分子單元）'})[_chapLevel];
  // 熱度圖只在單一學制下才有意義（避免國高中混同分母）；若年度控制列沒選學制，預設用國中，另提示
  const useLevel=yc.level||'國中';
  const scoped=yrows.filter(r=>r.level===useLevel);
  const keys=sortedYearKeys(scoped);
  const byYear={};keys.forEach(k=>byYear[k]=[]);
  scoped.forEach(r=>byYear[r._yk].push(r));
  const dists={};keys.forEach(k=>dists[k]=weightedDist(byYear[k],catFn,yc.weight));
  const catTotals={};
  scoped.forEach(r=>{const c=catFn(r);catTotals[c]=(catTotals[c]||0)+1;});
  const cats=sortByChapter(Object.keys(catTotals),useLevel,_chapLevel).slice(0,30);
  const heat=keys.length?heatmapTable(cats,keys,(cat,yk)=>{
    const list=byYear[yk];const n=list.filter(r=>catFn(r)===cat).length;
    if(!n)return null;
    const p=dists[yk][cat]||0;
    const ki=keys.indexOf(yk);const prevP=ki>0?(dists[keys[ki-1]][cat]||0):null;
    return {n,p,examN:new Set(list.map(r=>r.exam).filter(Boolean)).size,diff:prevP!=null?(p-prevP)*100:null};
  },{onClick:'chapHeatJump'}):'<div class="empty-note">此學制無可辨識年度資料</div>';
  // 變動榜（用最後兩個年度）
  let boards='';
  if(keys.length>=2){
    const cur=keys[keys.length-1],prev=keys[keys.length-2];
    const subCur=weightedDist(byYear[cur],r=>r.sub||'（未分）',yc.weight);
    const subPrev=weightedDist(byYear[prev],r=>r.sub||'（未分）',yc.weight);
    const allSubs=new Set([...Object.keys(subCur),...Object.keys(subPrev)]);
    const changes=[...allSubs].map(s=>({s,prev:(subPrev[s]||0)*100,cur:(subCur[s]||0)*100,diff:((subCur[s]||0)-(subPrev[s]||0))*100}));
    const inc=changes.filter(c=>c.diff>0).sort((a,b)=>b.diff-a.diff).slice(0,5);
    const dec=changes.filter(c=>c.diff<0).sort((a,b)=>a.diff-b.diff).slice(0,5);
    const neu=changes.filter(c=>c.prev===0&&c.cur>0).sort((a,b)=>b.cur-a.cur).slice(0,5);
    const mkBoard=(title,arr,showNew)=>`<div style="flex:1;min-width:240px"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px">${title}</div>${arr.length?arr.map(c=>`<div style="display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;border-bottom:1px solid var(--line)"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px" title="${esc(c.s)}">${esc(c.s)}</span><span>${showNew?`${c.cur.toFixed(1)}%`:`${c.prev.toFixed(1)}%→${c.cur.toFixed(1)}% <b class="${c.diff>=0?'pp-up':'pp-down'}">${ppFmt(c.diff)}</b>`}</span></div>`).join(''):'<div class="empty-note" style="padding:10px">無</div>'}</div>`;
    boards=`<div style="font-size:12.5px;font-weight:800;color:var(--red);margin:16px 0 8px">章節變動榜（${prev} → ${cur}，子單元）</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">${mkBoard('增加最多',inc)}${mkBoard('減少最多',dec)}${mkBoard('新出現',neu,true)}</div>`;
  }
  // 集中度（用課綱全部子單元數當分母）
  const allSubsSyl=new Set();
  SYL_ROWS.forEach(sr=>{const isHS=HS_BOOKS.includes(sr.book);if((isHS?'高中':'國中')===useLevel)allSubsSyl.add((isHS?sr.book:sr.book_name)+''+sr.sub);});
  const coveredSubs=new Set(scoped.map(r=>dbBookKey(r)+''+(r.sub||'')));
  const subCounts={};scoped.forEach(r=>{const k=r.sub||'（未分）';subCounts[k]=(subCounts[k]||0)+1;});
  const zeroSubs=[...allSubsSyl].filter(k=>!coveredSubs.has(k)).length;
  const oneTwoSubs=Object.values(subCounts).filter(n=>n<=2).length;
  const unitCounts={};scoped.forEach(r=>{const k=r.unit||'（未分）';unitCounts[k]=(unitCounts[k]||0)+1;});
  const unitSorted=Object.entries(unitCounts).sort((a,b)=>b[1]-a[1]);
  const top3=unitSorted.slice(0,3).reduce((s,[,n])=>s+n,0),top5=unitSorted.slice(0,5).reduce((s,[,n])=>s+n,0);
  const concentr=`<div style="font-size:12.5px;font-weight:800;color:var(--red);margin:16px 0 8px">章節集中度（${useLevel}）</div>
    <div class="grid">
      <div class="stat-card"><div class="n">${coveredSubs.size}<span style="font-size:14px;color:var(--muted)">/${allSubsSyl.size||'?'}</span></div><div class="lbl">已覆蓋子單元數</div></div>
      <div class="stat-card"><div class="n">${zeroSubs}</div><div class="lbl">課綱中 0 題子單元</div></div>
      <div class="stat-card"><div class="n">${oneTwoSubs}</div><div class="lbl">1～2 題子單元</div></div>
      <div class="stat-card"><div class="n">${pct(top3,scoped.length)}%</div><div class="lbl">前 3 大單元占比</div></div>
      <div class="stat-card"><div class="n">${pct(top5,scoped.length)}%</div><div class="lbl">前 5 大單元占比</div></div>
    </div>`;
  return `<div class="section"><h2>📈 年度章節編排變化</h2>${ycNote(yc)}
    <div class="desc">熱度圖：橫軸年度、縱軸章節、顏色為該年度內比例；滑鼠移上去看題數/比例/考卷數/與前一年差異。點格子可回題庫套用篩選。${yc.level?'':'（未指定學制，熱度圖預設顯示國中，可用上方「年度學制」切換）'}</div>
    <div style="margin-bottom:10px">層級：${levelSel.map(l=>`<button class="scope-btn${_chapLevel===l?' active':''}" style="padding:4px 12px" onclick="setChapLevel('${l}')">${levelName[l]}</button>`).join(' ')}　<span style="font-size:11px;color:var(--muted)">目前顯示：${useLevel}</span></div>
    ${heat}
    ${boards}
    ${concentr}
  </div>`;
}
function chapHeatJump(o){
  const patch={};
  if(_chapLevel==='field')patch.Field=o.row;
  else if(_chapLevel==='unit')patch.Unit=o.row;
  else if(_chapLevel==='sub')patch.Sub=o.row;
  else if(_chapLevel==='book')patch.Book=o.row;
  applyDrillFilter(patch);
}

// C. 年度科目與冊次安排（國中／高中各自 100% 堆疊）
function buildYearFieldBook(rows){
  const yc=getYearCtrl();
  if(!yearScopedRows(rows,yc).length)return '';
  const blocks=[];
  [['國中',JH_FIELDS],['高中',HS_FIELDS]].forEach(([lv,fieldOrder])=>{
    if(yc.level&&yc.level!==lv)return;

}

function buildYearTypeDist(rows,inner){

  const codeOrder=QTYPES.map(q=>q.code).filter(c=>keys.some(k=>dists[k][c]>0));

// E. 年度圖表類型分布
let _chartBase='all';
function setChartBase(v){_chartBase=v;render();}
function buildYearChartDist(rows){
  const yc=getYearCtrl();
  const yrows=yearScopedRows(rows,yc);
  if(!yrows.length)return arguments[1]?'<div class="empty-note">目前範圍沒有可辨識年度的題目。</div>':'';
  const keys=sortedYearKeys(yrows);
  const byYear={};keys.forEach(k=>byYear[k]=[]);yrows.forEach(r=>byYear[r._yk].push(r));
  // 有圖題比例趨勢
  const imgPairs=keys.map(k=>[k,Math.round(byYear[k].filter(r=>r.chartValid&&r.chartC!=='無').length/byYear[k].length*1000)/10]);
  // 12 類 × 年度熱度（底數：全部或有圖題）
  const base12=r=>_chartBase==='img'?(r.chartValid&&r.chartC!=='無'):r.chartValid;
  const denom={};keys.forEach(k=>denom[k]=byYear[k].filter(base12).length||1);
  const cats=CHART_CATS.filter(c=>_chartBase==='img'?c!=='無':true).filter(c=>keys.some(k=>byYear[k].some(r=>r.chartC===c)));
  const heat=heatmapTable(cats,keys,(cat,yk)=>{
    const n=byYear[yk].filter(r=>r.chartC===cat).length;if(!n)return null;
    const p=n/denom[yk];const ki=keys.indexOf(yk);
    const prevN=ki>0?byYear[keys[ki-1]].filter(r=>r.chartC===cat).length:null;
    const prevP=prevN!=null?prevN/denom[keys[ki-1]]:null;
    return {n,p,examN:new Set(byYear[yk].map(r=>r.exam).filter(Boolean)).size,diff:prevP!=null?(p-prevP)*100:null};
  },{onClick:'chartHeatJump'});
  const invalidN=yrows.filter(r=>!r.chartValid).length;
  const body=`${ycNote(yc)}
    <div class="desc">固定 12 類圖表類型 × 年度；「無」是有效分類會保留，未填／無效值不列入此圖${invalidN?`（${invalidN} 題未填／無效，見資料品質）`:''}。</div>
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px">有圖題比例趨勢 %</div>${lineSVG(imgPairs)}
    <div style="margin:12px 0 8px">底數：<button class="scope-btn${_chartBase==='all'?' active':''}" style="padding:4px 12px" onclick="setChartBase('all')">占全部題目</button> <button class="scope-btn${_chartBase==='img'?' active':''}" style="padding:4px 12px" onclick="setChartBase('img')">只看有圖題</button></div>
    ${heat}`;
  if(arguments[1])return body;
  return `<div class="section"><h2>🖼 年度圖表類型分布</h2>${body}</div>`;
}
function chartHeatJump(o){applyDrillFilter({Chart:o.row});}

// F. 年度難度與認知結構
function buildYearDifficulty(rows,inner){
  const yc=getYearCtrl();
  if(!yearScopedRows(rows,yc).length)return inner?'<div class="empty-note">目前範圍沒有可辨識年度的題目。</div>':'';
  const scoreSec=(field,label)=>yearStackSection(`${label}（1／2／3）`,'',rows,r=>{const v=+r[field];return (v>=1&&v<=3)?String(v):'（無效／缺）';},['1','2','3','（無效／缺）']);
  const diffSec=yearStackSection('綜合難度','簡單／中等／困難／極難／未評分。',rows,r=>r.diffLvl,['簡單','中等','困難','極難','未評分']);
  // 年度平均分折線（僅計有效分）
  const yrows=yearScopedRows(rows,yc);
  const keys=sortedYearKeys(yrows);
  const byYear={};keys.forEach(k=>byYear[k]=[]);yrows.forEach(r=>byYear[r._yk].push(r));
  const avgLine=(field,label)=>{
    const pairs=keys.map(k=>{const vals=byYear[k].map(r=>+r[field]).filter(v=>v>=1&&v<=3);return [k,vals.length?Math.round(vals.reduce((s,v)=>s+v,0)/vals.length*100)/100:0];});
    return `<div style="flex:1;min-width:260px"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px">${label}年度平均</div>${lineSVG(pairs)}</div>`;
  };
  const body=`${ycNote(yc)}
    <div class="desc">分數缺漏、0 分或超出 1～3 者列為「無效／缺」，不併入「簡單」。</div>
    ${diffSec}
    <div style="margin-top:14px"></div>${scoreSec('step','步驟分')}
    <div style="margin-top:14px"></div>${scoreSec('mem','記憶分')}
    <div style="margin-top:14px"></div>${scoreSec('con','概念分')}
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:14px">${avgLine('step','步驟分')}${avgLine('mem','記憶分')}${avgLine('con','概念分')}</div>`;
  if(inner)return body;
  return `<div class="section"><h2>🎚 年度難度與認知結構</h2>${body}</div>`;
}

// G. 資料品質與待整理（每張卡是一種「問題紀錄」，同一題可能落在多張卡）
const DQ_DEFS=[
  {key:'flag',lbl:'待確認 Y',filter:{Flag:'y'}},
  {key:'chartInvalid',lbl:'圖表類型未填／無效',filter:{Chart:'（未填寫）'}},
  {key:'missingImgRef',lbl:'含圖敘述但未上傳圖片',filter:{}},
  {key:'yearInvalid',lbl:'年度無法辨識',filter:{}},
  {key:'noLevel',lbl:'學制未標示',filter:{}},
  {key:'noField',lbl:'領域缺漏',filter:{}},
  {key:'noBook',lbl:'冊次缺漏',filter:{}},
  {key:'noUnit',lbl:'大單元缺漏',filter:{}},
  {key:'noSub',lbl:'子單元缺漏',filter:{}},
  {key:'fieldBookMismatch',lbl:'領域與冊次不一致',filter:{}},
  {key:'nonStdUnit',lbl:'非標準大單元',filter:{}},
  {key:'nonStdSub',lbl:'非標準子單元',filter:{}},
  {key:'crossChapter',lbl:'跨章節標記（含／）',filter:{}},
  {key:'notInSyllabus',lbl:'冊次不在教材骨架',filter:{}},
  {key:'diffMissing',lbl:'難度分數缺漏（含 0）',filter:{}},
  {key:'diffInvalid',lbl:'難度分數超出範圍',filter:{}},
  {key:'orphanGroup',lbl:'題組 ID 僅出現一題',filter:{}},
  {key:'aiAnswer',lbl:'答案由 AI 推論',filter:{}},
];
function buildDataQuality(rows){
  const total=rows.length;
  const cards=DQ_DEFS.map(d=>({...d,n:rows.filter(r=>r.dq[d.key]).length}));
  const grid=cards.map(c=>`<div class="dq-card${_dqOpen===c.key?' open':''}" onclick='dqToggle(${JSON.stringify(c.key)})'>
    <div class="n${c.n===0?' zero':''}">${c.n}</div>
    <div class="lbl">${esc(c.lbl)}${c.n?'<span class="dq-caret">▾</span>':''}</div>
    <div class="pctline">${c.n?'占目前範圍 '+pct(c.n,total)+'%':'目前範圍內沒有'}</div>
  </div>`).join('');
  // 點開的卡片 → 內嵌顯示前幾筆問題題目 + 查看全部
  let panel='';
  if(_dqOpen){
    const def=DQ_DEFS.find(d=>d.key===_dqOpen);
    const hits=rows.filter(r=>r.dq[_dqOpen]);
    if(def&&hits.length){
      const list=hits.slice(0,15).map(r=>`<div class="row dq-hit" onclick='jumpToBankWithExam(${JSON.stringify(r.exam||'')})' title="回題庫查看這份考卷">
        <span class="dq-hit-t">${esc(r.summary||'（無摘要）')}</span>
        <span class="dq-hit-m">${esc(r.year||'')}${r.school?'・'+esc(r.school):''}・${esc(r.exam||'')} 第${esc(r.no||'?')}題　<b style="color:#b23b3b">${esc(dqDetail(r,_dqOpen))}</b></span>
      </div>`).join('');
      const more=hits.length>15?`還有 ${hits.length-15} 筆`:'';
      const jumpBtn=(def.filter&&Object.keys(def.filter).length)
        ?`<button class="hbtn primary" style="padding:5px 12px;font-size:12px" onclick='applyDrillFilter(${JSON.stringify(def.filter)})'>查看全部（回本頁套用篩選）</button>`
        :`<span style="font-size:11.5px;color:var(--muted)">此類無對應下拉篩選；點任一列可回題庫查看該考卷</span>`;
      panel=`<div class="dq-panel"><div class="dq-panel-h"><b>${esc(def.lbl)}</b>　共 ${hits.length} 筆　${more?'（顯示前 15 筆，'+more+'）':''}<span style="margin-left:auto">${jumpBtn}</span></div>${list}</div>`;
    }
  }
  const anyN=rows.filter(r=>r.dq.any).length;          // 去重題目數
  const recN=cards.reduce((s,c)=>s+c.n,0);              // 問題紀錄總數（可重複）
  const chapterN=rows.filter(r=>r.dq.chapterNonStd).length;
  return `<div class="section"><h2>🩺 資料品質與待整理 <span class="badge"><b>${anyN}</b> 題至少一項問題　·　共 <b>${recN}</b> 筆問題紀錄</span></h2>
    <div class="desc">「${anyN} 題」為去重後的題目數；「${recN} 筆問題紀錄」為所有卡片計數加總，同一題可能同時落在多張卡片，故兩者不同。點卡片展開該類問題題目清單；此頁只診斷、不改資料。其中章節分類待正規化 <b>${chapterN}</b> 題。</div>
    <div class="dq-grid">${grid}</div>
    ${panel}
  </div>`;
}
let _dqOpen=null;
function dqToggle(key){_dqOpen=(_dqOpen===key?null:key);render();}
// 各問題類型要在清單裡補顯示的關鍵欄位值
function dqDetail(r,key){
  switch(key){
    case 'chartInvalid':return '圖表：'+(r.chart||'（空白）');
    case 'fieldBookMismatch':return `領域 ${r.field}／冊次 ${dbBookKey(r)}（課綱應為 ${SYL_FIELD_OF_BOOK[dbBookKey(r)]||'?'}）`;
    case 'nonStdUnit':return '大單元：'+(r.unit||'（空白）');
    case 'nonStdSub':return '子單元：'+(r.sub||'（空白）');
    case 'crossChapter':return (r.unit&&/／|\//.test(r.unit)?'大單元：'+r.unit:'子單元：'+r.sub);
    case 'notInSyllabus':return '冊次：'+(dbBookKey(r)||'（空白）');
    case 'yearInvalid':return '年度：'+(r.year||'（空白）');
    case 'diffMissing':case 'diffInvalid':return `步驟${r.step??'-'}／記憶${r.mem??'-'}／概念${r.con??'-'}`;
    case 'noField':return '領域空白';
    case 'noBook':return '冊次空白';
    case 'noUnit':return '大單元空白';
    case 'noSub':return '子單元空白';
    case 'noLevel':return '學制無法判定';
    case 'missingImgRef':return '題目提及圖但未上傳';
    case 'orphanGroup':return '題組ID：'+(r.group_id||'');
    case 'aiAnswer':return 'AI 判斷答案';
    default:return '';
  }
}

// I. 目標命題藍圖（只讀取與比較，不寫入）
function buildBlueprint(rows){
  // 僅在「已選取題目／考卷」範圍且有資料時提供；目標值先用「全題庫同學制平均」當基準示意，供比較
  if(scopeMode!=='picked'||!rows.length)return '';
  const lv=rows[0].level;
  const base=ALL.filter(r=>r.level===lv);
  if(!base.length)return '';
  const rowsD=(fn)=>qWeightedDist(rows,fn),baseD=(fn)=>qWeightedDist(base,fn);
  const metrics=[];
  const typeGroupFn=r=>{const i=qtypeInfo(r.typeCode);return i?i.group:'（未分類）';};
  const rt=rowsD(typeGroupFn),bt=baseD(typeGroupFn);
  TYPE_GROUP_ORDER.forEach(g=>metrics.push({name:'題型・'+g,actual:(rt[g]||0)*100,target:(bt[g]||0)*100}));
  const imgActual=rows.filter(r=>r.chartValid&&r.chartC!=='無').length/rows.length*100;
  const imgTarget=base.filter(r=>r.chartValid&&r.chartC!=='無').length/base.length*100;
  metrics.push({name:'有圖題比例',actual:imgActual,target:imgTarget});
  ['step','mem','con'].forEach((f,i)=>{
    const nm=['步驟分','記憶分','概念分'][i];
    const a=rows.map(r=>+r[f]).filter(v=>v>=1&&v<=3);const b=base.map(r=>+r[f]).filter(v=>v>=1&&v<=3);
    metrics.push({name:nm+'平均',actual:a.length?a.reduce((s,v)=>s+v,0)/a.length:0,target:b.length?b.reduce((s,v)=>s+v,0)/b.length:0,unit:'分'});
  });
  const rowsHtml=metrics.map(m=>{
    const diff=m.actual-m.target;const ad=Math.abs(diff);
    const status=ad<=3?'<span class="pp-up">合理</span>':ad<=8?'<span style="color:#c48a1a;font-weight:700">注意</span>':'<span class="pp-down">'+(diff>0?'偏高':'不足')+'</span>';
    const u=m.unit||'%';
    return `<tr><td>${esc(m.name)}</td><td class="num">${m.target.toFixed(1)}${u}</td><td class="num">${m.actual.toFixed(1)}${u}</td><td class="num">${(diff>=0?'+':'−')+ad.toFixed(1)}${m.unit?'':'pp'}</td><td>${status}</td></tr>`;
  }).join('');
  return `<div class="section"><h2>🎯 目標命題藍圖（讀取與比較）</h2>
    <div class="desc">以「全題庫同學制（${esc(lv||'?')}）平均」作為暫定目標基準，與目前選取的題目／考卷比較。狀態規則：差異 ≤3pp 合理、3～8pp 注意、>8pp 不足或偏高。此版本僅比較、不寫入自訂目標。</div>
    <div class="dt-wrap"><table class="dt"><thead><tr><th>指標</th><th>目標(基準)</th><th>實際</th><th>差異</th><th>狀態</th></tr></thead><tbody>${rowsHtml}</tbody></table></div>
  </div>`;
}

// ---------- 啟動 ----------
loadPickedFromStorage();
if(pickedIds||pickedExam)setScope('picked');
else document.getElementById('filterBar').style.display='none';
loadAll();
</script>
