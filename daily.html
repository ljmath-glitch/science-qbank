<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一題 · 茲茲文教</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --ink:#1a2238;--paper:#f4f1ea;--card:#fffefb;--line:#d8d2c4;
  --bio:#1f6f5c;--phy:#b8860b;--earth:#3454b4;
  --accent:#c0392b;--muted:#6b6557;
  --shadow:0 2px 0 #e8e2d4,0 8px 24px -12px rgba(26,34,56,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Songti SC","STSong","Noto Serif TC",Georgia,serif;
  background:radial-gradient(circle at 12% 8%,rgba(31,111,92,.07),transparent 40%),
             radial-gradient(circle at 88% 92%,rgba(52,84,180,.05),transparent 40%),
             var(--paper);
  color:var(--ink);line-height:1.7;min-height:100vh;
}

/* ── header ── */
header{
  background:linear-gradient(135deg,#13241f,#1a2238);
  color:#f4f1ea;padding:18px 20px 16px;
  border-bottom:4px solid var(--phy);
  position:relative;overflow:hidden;
}
header::after{
  content:"每日一題";position:absolute;right:16px;top:50%;
  transform:translateY(-50%);font-size:40px;font-weight:700;
  letter-spacing:6px;color:rgba(255,255,255,.05);
}
header h1{font-size:20px;letter-spacing:3px;font-weight:700}
header .sub{font-size:11px;color:#b9c2d6;margin-top:3px;letter-spacing:1px;font-family:system-ui,sans-serif}
.hdr-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:#b9c2d6;font-family:system-ui,sans-serif;
  text-decoration:none;margin-bottom:8px;opacity:.8;
}
.hdr-back:hover{opacity:1}

/* ── main layout ── */
.page{max-width:680px;margin:0 auto;padding:20px 16px 80px}

/* ── date nav ── */
.date-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.date-nav .nav-btn{
  background:var(--card);border:1px solid var(--line);border-radius:8px;
  padding:8px 14px;font-size:13px;font-family:system-ui,sans-serif;
  color:var(--muted);cursor:pointer;transition:.15s;
}
.date-nav .nav-btn:hover{background:#f0ece2;color:var(--ink)}
.date-nav .nav-btn:disabled{opacity:.35;cursor:not-allowed}
.date-center{text-align:center}
.date-label{font-family:system-ui,sans-serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:1px}
.date-sub{font-family:system-ui,sans-serif;font-size:11px;color:var(--muted);margin-top:1px}

/* ── streak ── */
.streak-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:20px;font-family:system-ui,sans-serif;font-size:12px;color:var(--muted);
}
.streak-fire{font-size:18px}
.streak-count{font-size:18px;font-weight:700;color:var(--phy)}

/* ── question card ── */
.q-card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;
}
.q-card-head{
  padding:14px 18px 12px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.tag{
  font-size:11px;padding:3px 10px;border-radius:18px;
  font-weight:600;letter-spacing:.3px;font-family:system-ui,sans-serif;
}
.tag.bio{background:#eef7f3;color:var(--bio)}
.tag.phy{background:#fff6e0;color:var(--phy)}
.tag.earth{background:#eef3ff;color:var(--earth)}
.tag.chem{background:#fdeeee;color:var(--accent)}
.tag.diff{background:#f0ece2;color:var(--muted)}
.tag.diff.d1{background:#e8f5e9;color:#2e7d32}
.tag.diff.d2{background:#fff8e1;color:#f57f17}
.tag.diff.d3{background:#fff0e0;color:#e8740c}
.tag.diff.d4{background:#ffebee;color:#c62828}
.q-num{
  margin-left:auto;font-family:system-ui,sans-serif;
  font-size:12px;color:var(--muted);
}

.q-body{padding:18px 18px 6px;font-size:16px;line-height:1.85}
.q-passage{
  background:#f7f4ec;border-left:3px solid var(--phy);
  border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:14px;
  font-size:14px;color:#3a3328;
}
.q-stem{margin-bottom:14px}

/* ── options ── */
.opts{padding:0 18px 18px;display:flex;flex-direction:column;gap:9px}
.opt-btn{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;border-radius:10px;border:1.5px solid var(--line);
  background:#fff;cursor:pointer;text-align:left;
  font-family:"Songti SC","STSong","Noto Serif TC",Georgia,serif;
  font-size:15px;color:var(--ink);transition:.18s;line-height:1.6;
  width:100%;
}
.opt-btn:hover:not(:disabled){border-color:var(--bio);background:#f4faf7;transform:translateX(2px)}
.opt-btn .opt-label{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;min-width:26px;border-radius:50%;
  background:var(--paper);border:1.5px solid var(--line);
  font-size:13px;font-weight:700;font-family:system-ui,sans-serif;
  color:var(--muted);transition:.18s;margin-top:1px;
}
.opt-btn.selected .opt-label{background:var(--bio);border-color:var(--bio);color:#fff}
.opt-btn.selected{border-color:var(--bio);background:#f0faf5}
.opt-btn.correct{border-color:#27ae60;background:#f0faf5}
.opt-btn.correct .opt-label{background:#27ae60;border-color:#27ae60;color:#fff}
.opt-btn.wrong{border-color:var(--accent);background:#fff5f5}
.opt-btn.wrong .opt-label{background:var(--accent);border-color:var(--accent);color:#fff}
.opt-btn:disabled{cursor:default;transform:none}

/* ── action row ── */
.action-row{padding:0 18px 18px;display:flex;gap:10px}
.btn-reveal{
  flex:1;padding:14px;border-radius:10px;border:none;
  background:var(--bio);color:#fff;font-size:16px;font-weight:700;
  font-family:system-ui,sans-serif;cursor:pointer;letter-spacing:1px;
  transition:.18s;
}
.btn-reveal:hover{background:#185f4e;transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(31,111,92,.5)}
.btn-reveal:disabled{background:#a0c4bb;cursor:not-allowed;transform:none;box-shadow:none}
.btn-again{
  padding:14px 18px;border-radius:10px;border:1.5px solid var(--line);
  background:#fff;color:var(--muted);font-size:14px;font-weight:600;
  font-family:system-ui,sans-serif;cursor:pointer;transition:.18s;
}
.btn-again:hover{border-color:var(--muted);color:var(--ink)}

/* ── result badge ── */
.result-badge{
  margin:0 18px 14px;padding:10px 16px;border-radius:10px;
  font-family:system-ui,sans-serif;font-size:14px;font-weight:700;
  display:none;align-items:center;gap:8px;
}
.result-badge.correct{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;display:flex}
.result-badge.wrong{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;display:flex}

/* ── explanation ── */
.explain-card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);overflow:hidden;display:none;
}
.explain-card.show{display:block}
.explain-head{
  background:var(--ink);color:#f4f1ea;
  padding:12px 18px;font-size:14px;font-weight:700;letter-spacing:2px;
  font-family:system-ui,sans-serif;display:flex;align-items:center;gap:8px;
}
.explain-hint{
  background:#fdf3f0;border:1px solid #f0c4bb;border-radius:8px;
  padding:9px 14px;margin:14px 18px 0;
  font-size:13px;color:#8b3a2e;font-family:system-ui,sans-serif;
  line-height:1.6;
}
.explain-body{padding:14px 18px 18px;font-size:15px;line-height:1.9}
.explain-body p{margin-bottom:10px}
.explain-body .step{
  background:#f7f4ec;border-radius:8px;padding:12px 16px;
  margin:10px 0;font-size:14px;
}
.explain-body .step-title{
  font-family:system-ui,sans-serif;font-size:12px;font-weight:700;
  color:var(--phy);margin-bottom:6px;letter-spacing:1px;
}

/* highlighted numbers (like the app screenshot) */
.hl{
  background:rgba(184,134,11,.15);
  border-bottom:2px dotted var(--phy);
  border-radius:2px;padding:0 2px;
}
.hl.red{
  background:rgba(192,57,43,.12);
  border-bottom-color:var(--accent);
}

/* ── knowledge tag ── */
.kp-row{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:12px 18px;border-top:1px dashed var(--line);
  font-family:system-ui,sans-serif;font-size:12px;color:var(--muted);
}
.kp-label{font-weight:700;color:var(--phy);margin-right:2px}
.kp-tag{
  background:#fff6e0;color:var(--phy);border-radius:12px;
  padding:2px 10px;font-size:11px;font-weight:600;
}

/* ── progress dots ── */
.week-dots{
  display:flex;justify-content:center;gap:8px;margin-bottom:20px;
}
.dot{
  width:32px;height:32px;border-radius:50%;
  background:var(--card);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:system-ui,sans-serif;font-size:10px;color:var(--muted);
  font-weight:600;flex-direction:column;gap:1px;
}
.dot.done{background:var(--bio);border-color:var(--bio);color:#fff}
.dot.today{border-color:var(--phy);color:var(--phy);font-weight:800;
  box-shadow:0 0 0 3px rgba(184,134,11,.2)}
.dot.missed{background:#f5eee8;border-color:var(--line)}
.dot .dot-day{font-size:8px;opacity:.8}

/* ── loading ── */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-family:system-ui,sans-serif}

@media(max-width:480px){
  .date-label{font-size:18px}
  .q-body{font-size:15px}
  .opt-btn{font-size:14px}
}
</style>
</head>
<body>

<header>
  <div>
    <a class="hdr-back" href="index.html">← 返回題庫系統</a>
    <h1>每日一題</h1>
    <div class="sub">每天一道，穩紮穩打 · 茲茲文教自然科</div>
  </div>
</header>

<div class="page">

  <!-- streak -->
  <div class="streak-bar">
    <span class="streak-fire">🔥</span>
    <span>連續作答</span>
    <span class="streak-count" id="streakCount">0</span>
    <span>天</span>
  </div>

  <!-- week dots -->
  <div class="week-dots" id="weekDots"></div>

  <!-- date nav -->
  <div class="date-nav">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">◀ 前一天</button>
    <div class="date-center">
      <div class="date-label" id="dateLabel"></div>
      <div class="date-sub" id="dateSub"></div>
    </div>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">後一天 ▶</button>
  </div>

  <!-- question card -->
  <div class="q-card" id="qCard">
    <div class="q-card-head" id="qHead"></div>
    <div class="q-body" id="qBody"></div>
    <div class="opts" id="qOpts"></div>
    <div class="result-badge" id="resultBadge"></div>
    <div class="action-row">
      <button class="btn-reveal" id="btnReveal" onclick="reveal()" disabled>請先選擇答案</button>
      <button class="btn-again" id="btnAgain" onclick="resetAnswer()" style="display:none">重做</button>
    </div>
  </div>

  <!-- explanation -->
  <div class="explain-card" id="explainCard">
    <div class="explain-head">💡 詳解</div>
    <div class="explain-hint" id="explainHint" style="display:none"></div>
    <div class="explain-body" id="explainBody"></div>
    <div class="kp-row" id="kpRow"></div>
  </div>

</div>

<script>
// ── Sample question bank ──────────────────────────────────────
const QUESTIONS = [
  {
    subject:'chem', subjectLabel:'化學',
    difficulty:2,
    source:'110學年度學測',
    stem:'在標準狀況下，將 <span class="hl">8.0 g</span> 的 $\\text{Fe}_x\\text{O}_y$ 與足量一氧化碳反應，完全還原後得到鐵粉 <span class="hl">5.6 g</span>。則此鐵的氧化物化學式為何？',
    opts:['FeO','$\\text{Fe}_2\\text{O}_3$','$\\text{Fe}_3\\text{O}_4$','$\\text{Fe}_2\\text{O}$'],
    ans:1,
    explain:{
      hint:'可先計算氧的質量，再求 Fe 與 O 的莫耳數比。',
      steps:[
        {title:'STEP 1　求氧的質量',
         body:'$m_\\text{O} = \\text{\\small 8.0} - \\text{\\small 5.6} = \\class{hl}{2.4}\\text{ g}$'},
        {title:'STEP 2　求莫耳數',
         body:'$n_\\text{Fe} = \\dfrac{5.6}{56} = \\class{hl}{0.1}\\text{ mol}$，$n_\\text{O} = \\dfrac{2.4}{16} = \\class{hl}{0.15}\\text{ mol}$'},
        {title:'STEP 3　求簡單整數比',
         body:'$n_\\text{Fe} : n_\\text{O} = 0.1 : 0.15 = \\class{hl}{2 : 3}$，故化學式為 $\\text{Fe}_2\\text{O}_3$。'},
      ],
      answer:'答案為 (B) $\\text{Fe}_2\\text{O}_3$，即氧化鐵（三價鐵）。',
      keywords:['化學計量','氧化物','莫耳數','質量守恆'],
    }
  },
  {
    subject:'phy', subjectLabel:'物理',
    difficulty:2,
    source:'111學年度指考',
    stem:'一物體靜置於水平面上，已知物體質量為 <span class="hl">5 kg</span>，與地面的靜摩擦係數 $\\mu_s = \\class{hl}{0.4}$，動摩擦係數 $\\mu_k = 0.3$。若施以水平力 $F = \\class{hl}{25}\\text{ N}$，則物體的加速度大小為何？（$g = 10\\text{ m/s}^2$）',
    opts:['$0\\text{ m/s}^2$（靜止）','$1\\text{ m/s}^2$','$2\\text{ m/s}^2$','$5\\text{ m/s}^2$'],
    ans:1,
    explain:{
      hint:'先比較施力與最大靜摩擦力大小，再決定用哪個摩擦係數。',
      steps:[
        {title:'STEP 1　最大靜摩擦力',
         body:'$f_{s,\\max} = \\mu_s \\cdot mg = \\class{hl}{0.4} \\times 5 \\times 10 = \\class{hl}{20}\\text{ N}$'},
        {title:'STEP 2　判斷是否移動',
         body:'$F = 25\\text{ N} > f_{s,\\max} = 20\\text{ N}$，物體開始運動，使用動摩擦力。'},
        {title:'STEP 3　求加速度',
         body:'$f_k = \\mu_k mg = \\class{hl}{0.3} \\times 50 = \\class{hl}{15}\\text{ N}$<br>$a = \\dfrac{F - f_k}{m} = \\dfrac{25-15}{5} = \\class{hl}{2}\\text{ m/s}^2$'},
      ],
      answer:'答案為 (C) $2\\text{ m/s}^2$。',
      keywords:['牛頓第二定律','靜摩擦力','動摩擦力'],
    }
  },
  {
    subject:'bio', subjectLabel:'生物',
    difficulty:1,
    source:'112學年度學測',
    stem:'下列關於細胞有氧呼吸的敘述，何者正確？',
    opts:[
      '糖解作用發生於粒線體基質中',
      '電子傳遞鏈產生最多 ATP，發生於粒線體內膜',
      '克氏循環不需要氧氣，但需要 $\\text{CO}_2$',
      '一分子葡萄糖完整氧化可淨產生 2 個 ATP',
    ],
    ans:1,
    explain:{
      hint:'複習有氧呼吸三個階段的位置與產物。',
      steps:[
        {title:'糖解作用',
         body:'發生於<strong>細胞質基質</strong>（不是粒線體），分解葡萄糖為丙酮酸，淨產生 <span class="hl">2 ATP</span>。'},
        {title:'克氏循環（TCA循環）',
         body:'發生於粒線體<strong>基質</strong>，需要乙醯CoA，產生 NADH、FADH₂ 及 CO₂。'},
        {title:'電子傳遞鏈（氧化磷酸化）',
         body:'發生於粒線體<strong>內膜</strong>，利用 NADH、FADH₂ 驅動 ATP 合成酶，產生大量 ATP（約 <span class="hl">32～34 個</span>）。最終電子受體為 O₂。'},
      ],
      answer:'答案為 (B)。電子傳遞鏈確實產生最多ATP，且位於粒線體內膜。',
      keywords:['細胞呼吸','粒線體','ATP','電子傳遞鏈'],
    }
  },
  {
    subject:'earth', subjectLabel:'地科',
    difficulty:2,
    source:'113學年度學測',
    stem:'下列哪一地質現象最能說明板塊聚合邊界（隱沒帶）的存在？',
    opts:[
      '中洋脊兩側的磁異常條帶呈對稱分布',
      '深源地震沿斜面分布（貝尼奧夫帶）',
      '海洋中脊附近海溝發育',
      '大陸板塊年齡比海洋板塊古老',
    ],
    ans:1,
    explain:{
      hint:'聚合邊界有隱沒現象，思考哪個現象只出現在這裡。',
      steps:[
        {title:'貝尼奧夫帶',
         body:'隱沒板塊沿斜面下插，在深度 <span class="hl">70～700 km</span> 間引發深源地震，形成從淺到深的斜向地震帶，為隱沒帶的直接證據。'},
        {title:'排除其他選項',
         body:'(A) 磁異常條帶是<strong>張裂</strong>邊界（中洋脊）的特徵；(C) 海溝出現在隱沒帶但中洋脊是張裂；(D) 板塊年齡分布與擴張速率有關，非聚合邊界特徵。'},
      ],
      answer:'答案為 (B) 深源地震沿貝尼奧夫帶分布。',
      keywords:['板塊構造','隱沒帶','貝尼奧夫帶','地震'],
    }
  },
  {
    subject:'chem', subjectLabel:'化學',
    difficulty:1,
    source:'109學年度指考',
    stem:'取 $\\class{hl}{0.1}\\text{ M}$ 鹽酸 <span class="hl">100 mL</span> 與 $\\class{hl}{0.1}\\text{ M}$ 氫氧化鈉 <span class="hl">80 mL</span> 混合後，溶液的 pH 值最接近何者？',
    opts:['pH = 7（中性）','pH < 7（酸性）','pH > 7（鹼性）','無法判斷'],
    ans:1,
    explain:{
      hint:'先算兩種溶液的莫耳數，再看哪種過量。',
      steps:[
        {title:'STEP 1　計算莫耳數',
         body:'$n_{\\text{HCl}} = \\class{hl}{0.1} \\times \\class{hl}{0.1} = 0.01\\text{ mol}$<br>$n_{\\text{NaOH}} = \\class{hl}{0.1} \\times \\class{hl}{0.08} = 0.008\\text{ mol}$'},
        {title:'STEP 2　中和後剩餘',
         body:'HCl 過量 $= 0.01 - 0.008 = \\class{hl}{0.002}\\text{ mol}$，溶液呈酸性。'},
        {title:'STEP 3　計算 pH',
         body:'總體積 $= 180\\text{ mL} = 0.18\\text{ L}$<br>$[\\text{H}^+] = \\dfrac{0.002}{0.18} \\approx \\class{hl}{0.011}\\text{ M}$<br>$\\text{pH} \\approx -\\log(0.011) \\approx \\class{hl}{1.96}$'},
      ],
      answer:'答案為 (B) pH < 7（酸性），HCl 過量使溶液呈酸性。',
      keywords:['酸鹼中和','pH','莫耳數計算','當量點'],
    }
  },
  {
    subject:'phy', subjectLabel:'物理',
    difficulty:3,
    source:'112學年度指考',
    stem:'一單擺在地表附近振動，擺長為 $L = \\class{hl}{1\\text{ m}}$，忽略空氣阻力。已知 $g = \\pi^2 \\approx 9.87\\text{ m/s}^2$，則此擺的週期 $T$ 為何？',
    opts:['$T = 1\\text{ s}$','$T = 2\\text{ s}$','$T = \\pi\\text{ s}$','$T = 4\\text{ s}$'],
    ans:1,
    explain:{
      hint:'單擺週期公式 $T = 2\\pi\\sqrt{L/g}$，注意 $g \\approx \\pi^2$ 的小技巧。',
      steps:[
        {title:'代入公式',
         body:'$T = 2\\pi\\sqrt{\\dfrac{L}{g}} = 2\\pi\\sqrt{\\dfrac{\\class{hl}{1}}{\\class{hl}{\\pi^2}}} = 2\\pi \\cdot \\dfrac{1}{\\pi} = \\class{hl}{2}\\text{ s}$'},
      ],
      answer:'答案為 (B) $T = 2\\text{ s}$。',

    }

  {
    subject:'bio', subjectLabel:'生物',
    difficulty:2,
    source:'111學年度學測',
    stem:'下列關於 DNA 複製的敘述，何者正確？',
    opts:[
      'DNA 複製是保留式複製，親代雙股完整保留',
      'DNA 聚合酶可以從 5\'→3\' 及 3\'→5\' 方向合成新股',
      '引導股（leading strand）連續合成，落後股（lagging strand）不連續合成，產生岡崎片段',
      '複製完成後，子代 DNA 均由兩條新合成的股組成',
    ],
    ans:2,
    explain:{
      hint:'DNA 複製為半保留式，方向性是關鍵。',
      steps:[
        {title:'半保留複製',
         body:'每條子代 DNA 含一條<strong>親代舊股</strong>與一條<strong>新合成股</strong>，稱為半保留式，已由 Meselson-Stahl 實驗證明。'},
        {title:'合成方向',
         body:'DNA 聚合酶只能以 <span class="hl">5\'→3\'</span> 方向合成，因此以 3\'→5\' 模板股連續合成引導股，另一股則不連續產生<strong>岡崎片段</strong>。'},
      ],
      answer:'答案為 (C)。引導股連續合成，落後股不連續合成，產生岡崎片段。',
      keywords:['DNA複製','半保留式','岡崎片段','DNA聚合酶'],

// ── State ─────────────────────────────────────────────────────
const TODAY_OFFSET = 0;  // 0 = today
let currentOffset = 0;   // days from today (0=today, -1=yesterday...)
let selectedOpt = null;
let revealed = false;

// localStorage keys
const KEY_STREAK = 'dq_streak';
const KEY_LAST   = 'dq_last_date';
const KEY_HIST   = 'dq_history';  // {dateStr: {selected, correct}}

function todayStr(offset=0){
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}

function getHistory(){ return JSON.parse(localStorage.getItem(KEY_HIST)||'{}') }
function saveHistory(h){ localStorage.setItem(KEY_HIST, JSON.stringify(h)) }

function getQuestion(offset){
  // pick question by date deterministically
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const epoch = Math.floor(d.getTime() / 86400000);
  return QUESTIONS[((epoch % QUESTIONS.length) + QUESTIONS.length) % QUESTIONS.length];
}

// ── Render ────────────────────────────────────────────────────
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const MONTHS   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function renderDate(){
  const d = new Date();
  d.setDate(d.getDate() + currentOffset);
  document.getElementById('dateLabel').textContent =
    `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  const isToday = currentOffset === 0;
  document.getElementById('dateSub').textContent =
    isToday ? `今天・星期${WEEKDAYS[d.getDay()]}` : `星期${WEEKDAYS[d.getDay()]}`;
  document.getElementById('btnNext').disabled = currentOffset >= 0;
}

function renderWeekDots(){
  const hist = getHistory();
  const container = document.getElementById('weekDots');
  container.innerHTML = '';
  for(let i = -6; i <= 0; i++){
    const dt = new Date();
    dt.setDate(dt.getDate() + i);
    const str = dt.toISOString().slice(0,10);
    const day = WEEKDAYS[dt.getDay()];
    const rec = hist[str];
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===0?' today':'') + (rec ? (rec.correct?' done':' missed') : '');
    dot.innerHTML = `<span>${i===0?'今':day}</span><span class="dot-day">${dt.getDate()}</span>`;
    dot.title = str + (rec ? (rec.correct?' ✓':' ✗') : ' 未作答');
    container.appendChild(dot);
  }
}

function renderStreak(){
  const hist = getHistory();
  let streak = 0;
  for(let i = 0; i >= -365; i--){
    const s = todayStr(i);
    if(hist[s]?.correct){ streak++ } else { break }
  }
  document.getElementById('streakCount').textContent = streak;
}

const SUBJ_CLASS = {chem:'chem',bio:'bio',phy:'phy',earth:'earth'};
const DIFF_LABEL = {1:'★ 基礎',2:'★★ 進階',3:'★★★ 挑戰',4:'★★★★ 困難'};

function renderQuestion(){
  const q = getQuestion(currentOffset);
  const hist = getHistory();
  const dateKey = todayStr(currentOffset);
  const rec = hist[dateKey];

  selectedOpt = rec ? rec.selected : null;
  revealed = !!rec;

  // head
  const head = document.getElementById('qHead');
  head.innerHTML = `
    <span class="tag ${SUBJ_CLASS[q.subject]||''}">${q.subjectLabel}</span>
    <span class="tag diff d${q.difficulty}">${DIFF_LABEL[q.difficulty]||''}</span>
    <span class="q-num">${q.source}</span>
  `;

  // body / stem
  const body = document.getElementById('qBody');
  body.innerHTML = `<div class="q-stem">${q.stem}</div>`;

  // options
  const optsEl = document.getElementById('qOpts');
  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.dataset.i = i;
    const label = String.fromCharCode(65+i);
    btn.innerHTML = `<span class="opt-label">${label}</span><span>${opt}</span>`;

    if(revealed){
      btn.disabled = true;
      if(i === q.ans) btn.classList.add('correct');
      if(i === selectedOpt && selectedOpt !== q.ans) btn.classList.add('wrong');
    } else {
      if(i === selectedOpt) btn.classList.add('selected');
      btn.onclick = () => selectOpt(i);
    }
    optsEl.appendChild(btn);
  });

  // result badge
  const badge = document.getElementById('resultBadge');
  badge.className = 'result-badge';
  if(revealed && rec){
    if(rec.correct){
      badge.className = 'result-badge correct';
      badge.innerHTML = '✓ 答對了！繼續保持';
    } else {
      badge.className = 'result-badge wrong';
      badge.innerHTML = `✗ 答錯了，正確答案是 (${String.fromCharCode(65+q.ans)})`;
    }
  }

  // action buttons
  const btnReveal = document.getElementById('btnReveal');
  const btnAgain = document.getElementById('btnAgain');
  if(revealed){
    btnReveal.style.display = 'none';
    btnAgain.style.display = 'block';
  } else {
    btnReveal.style.display = '';
    btnAgain.style.display = 'none';
    btnReveal.disabled = selectedOpt === null;
    btnReveal.textContent = selectedOpt !== null ? '揭曉答案' : '請先選擇答案';
  }

  // explanation
  const explainCard = document.getElementById('explainCard');
  if(revealed){
    explainCard.classList.add('show');
    renderExplanation(q);
  } else {
    explainCard.classList.remove('show');
  }

  // render math
  setTimeout(() => {
    renderMathInElement(document.body, {
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false},
      ],
      throwOnError:false,
    });
  }, 50);
}

function renderExplanation(q){
  const hint = document.getElementById('explainHint');
  if(q.explain.hint){
    hint.style.display = '';
    hint.innerHTML = '💡 ' + q.explain.hint;
  } else {
    hint.style.display = 'none';
  }

  let html = '';
  q.explain.steps.forEach(s => {
    html += `<div class="step"><div class="step-title">${s.title}</div><div>${s.body}</div></div>`;
  });
  html += `<p style="margin-top:14px;font-weight:700;color:var(--bio)">${q.explain.answer}</p>`;
  document.getElementById('explainBody').innerHTML = html;

  const kpRow = document.getElementById('kpRow');
  kpRow.innerHTML = '<span class="kp-label">知識點：</span>' +
    q.explain.keywords.map(k => `<span class="kp-tag">${k}</span>`).join('');
}

// ── Interactions ──────────────────────────────────────────────
function selectOpt(i){
  if(revealed) return;
  selectedOpt = i;
  document.querySelectorAll('.opt-btn').forEach((b,j) => {
    b.classList.toggle('selected', j===i);
  });
  const btn = document.getElementById('btnReveal');
  btn.disabled = false;
  btn.textContent = '揭曉答案';
}

function reveal(){
  if(selectedOpt === null) return;
  const q = getQuestion(currentOffset);
  const correct = selectedOpt === q.ans;
  const dateKey = todayStr(currentOffset);
  const hist = getHistory();
  hist[dateKey] = {selected: selectedOpt, correct};
  saveHistory(hist);
  revealed = true;
  renderQuestion();
  renderWeekDots();
  renderStreak();
  // scroll to explanation
  setTimeout(() => {
    document.getElementById('explainCard').scrollIntoView({behavior:'smooth',block:'start'});
  }, 200);
}

function resetAnswer(){
  const dateKey = todayStr(currentOffset);
  const hist = getHistory();
  delete hist[dateKey];
  saveHistory(hist);
  renderQuestion();
  renderWeekDots();
  renderStreak();
}

function navigate(dir){
  const newOffset = currentOffset + dir;
  if(newOffset > 0) return;
  currentOffset = newOffset;
  renderDate();
  renderQuestion();
}

// ── Init ──────────────────────────────────────────────────────
renderDate();
renderWeekDots();
renderStreak();
renderQuestion();
</script>
