<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>共編進度表 — 茲茲文教</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f5f2;--card:#fff;--line:#e6e4de;--text:#2d3038;--muted:#6e6f74;--primary:#850103;--green:#2d9060;--red:#c0392b;--orange:#f9a12c;--ui-font:"PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui-font);font-weight:500;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:#fffefb;color:var(--text);padding:12px 0;border-bottom:1px solid var(--line);box-shadow:0 1px 2px rgba(45,48,56,.04)}
.wrap{max-width:1280px;margin:0 auto;padding:0 20px}
header .wrap{display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:700;flex:1}
.hbtn{padding:6px 13px;border:1px solid var(--line);border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:var(--text);font-family:inherit;text-decoration:none;display:inline-block;transition:.15s}
.hbtn:hover{border-color:var(--primary);color:var(--primary)}
.toolbar{background:#fff;border-bottom:1px solid var(--line);padding:10px 0;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.toolbar .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar label{font-size:13px;font-weight:600;white-space:nowrap}
.name-inp{padding:5px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;width:140px}
.stat{font-size:12px;color:var(--muted);margin-left:auto}
.main{padding:24px 0 60px}
.tbl-wrap{overflow:auto;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);max-height:calc(100vh - 130px)}
table{width:100%;border-collapse:collapse;background:var(--card);min-width:860px}
thead th{background:#f2f1ec;font-size:12px;font-weight:700;padding:10px 12px;text-align:center;border-bottom:2px solid var(--line);white-space:nowrap;color:var(--muted);position:sticky;top:0;z-index:2}
.cheer{background:linear-gradient(90deg,#fff6ec,#fdf2ea);border-bottom:1px solid var(--line);color:#9a6a1a;font-size:13.5px;font-weight:600;text-align:center;padding:9px 20px;letter-spacing:.3px}
thead th.left{text-align:left}
tbody td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fdfaf5}
.center{text-align:center}
.count-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700;background:#f6eceb;color:#850103}
.chk-cell{text-align:center}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--green)}
.note-inp{width:100%;padding:4px 8px;border:1px solid transparent;border-radius:5px;font-size:12px;font-family:inherit;background:transparent;color:var(--text)}
.note-inp:focus{outline:none;border-color:var(--line);background:#fff}
.ts-cell{font-size:11px;color:var(--muted);text-align:center;line-height:1.5;white-space:nowrap}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
.loading{text-align:center;padding:50px;color:var(--muted)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.pill-done{background:#d4f5e3;color:#1a6e45}
.pill-none{background:#f0ece2;color:#7a6e60}
.saving-indicator{font-size:12px;color:var(--muted);display:none}
.saving-indicator.show{display:inline}
th.sort-header{cursor:pointer;user-select:none}
th.sort-header:hover{background:#e5ddd0}
.name-inp-cell{width:100%;padding:4px 8px;border:1px solid transparent;border-radius:5px;font-size:13px;font-family:inherit;background:transparent;color:var(--text);min-width:200px}
.name-inp-cell:hover{border-color:var(--line)}
.name-inp-cell:focus{outline:none;border-color:var(--primary);background:#fff}
.add-btn{margin-top:12px;padding:8px 16px;border:2px dashed var(--line);border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;width:100%;text-align:left}
.add-btn:hover{border-color:var(--primary);color:var(--primary);background:#faf0ee}
.del-btn{padding:2px 6px;border:none;border-radius:4px;background:transparent;color:#ccc;cursor:pointer;font-size:14px;line-height:1}
.del-btn:hover{background:#fee;color:var(--red)}
.link-btn{display:inline-flex;align-items:center;justify-content:center;padding:3px;border:none;border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;flex-shrink:0;text-decoration:none}
.link-btn:hover{background:#f6eceb;color:var(--primary)}
.link-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;display:block}
.link-btn-ph{display:inline-block;width:21px;flex-shrink:0}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>共編進度表</h1>
    <a class="hbtn" href="index.html">← 回題庫</a>
    <button class="hbtn" onclick="loadAll()">重新整理</button>
  </div>
</header>

<div class="toolbar">
  <div class="wrap">
    <label>更新者姓名：</label>
    <input class="name-inp" id="userName" placeholder="請填您的姓名" oninput="saveName()">
    <span class="saving-indicator" id="savingInd">儲存中…</span>
    <div class="stat" id="statLine"></div>
  </div>
</div>

<div class="cheer" id="cheer"></div>

<div class="main">
  <div class="wrap">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th class="left sort-header" onclick="sortBy('displayName')">考卷名稱 ↕</th>
            <th>題數</th>
            <th>確認公式</th>
            <th>上傳圖片</th>
            <th>製作詳解</th>
            <th>題幹敘述確認</th>
            <th>題組/承上題確認</th>
            <th>其他確認</th>
            <th style="min-width:160px">備註</th>
            <th>最後更新</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="10" class="loading">載入中…</td></tr>
        </tbody>
      </table>
    </div>
    <button class="add-btn" onclick="addManualExam()">＋ 手動新增考卷</button>
    <div id="emptyMsg" class="empty" style="display:none">題庫中尚無題目，請先到題庫匯入資料。</div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://esfepufqyeplafzbeeag.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_P_OpGwKYuWxpHMHCZdQRPA_1lCCLfNf';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const PROGRESS_ROW_ID = 2; // 存在 syllabus_doc 表的 id=2

let exams = [];       // [{school, grade, year, round, displayName, count}]
let progressMap = {}; // { id: {...} }
let sortKey = 'year';
let sortAsc = false;

function bookToGrade(book){return book==='B1'||book==='B2'?'七年級':book==='B3'||book==='B4'?'八年級':book==='B5'||book==='B6'?'九年級':'';}
function gradeFromExam(exam,book){
  if(exam){
    if(exam.includes('九年級')||exam.includes('國三'))return '九年級';
    if(exam.includes('八年級')||exam.includes('國二'))return '八年級';
    if(exam.includes('七年級')||exam.includes('國一'))return '七年級';
    if(exam.includes('高一'))return '高一';
    if(exam.includes('高二'))return '高二';
    if(exam.includes('高三'))return '高三';
    if(exam.includes('高中')||exam.includes('學測')||exam.includes('分科測驗'))return '高中';
  }
  return bookToGrade(book);
}
function examRound(exam){if(!exam)return '';if(exam.includes('會考'))return '會考';if(exam.includes('學測'))return '學測';if(exam.includes('分科測驗'))return '分科測驗';if(exam.includes('第一次'))return '第一次段考';if(exam.includes('第二次'))return '第二次段考';if(exam.includes('第三次'))return '第三次段考';return exam;}
function composeDisplayName(school,grade,year,round){
  if(round==='會考') return (year||'')+'會考';
  return [school,grade,year,round].filter(Boolean).join('-')||'（未命名）';
}

// ── 姓名 ──────────────────────────────────────────
function saveName(){ localStorage.setItem('pgUserName', document.getElementById('userName').value); }
function loadName(){ document.getElementById('userName').value = localStorage.getItem('pgUserName') || ''; }

// ── 進度資料讀寫（存在 syllabus_doc id=2 的 content 欄） ──
async function loadProgress(){
  const {data, error} = await sb.from('syllabus_doc').select('content').eq('id', PROGRESS_ROW_ID).maybeSingle();
  if(error || !data) return {};
  try { return JSON.parse(data.content || '{}'); } catch(e){ return {}; }
}

async function saveProgress(){
  const {error} = await sb.from('syllabus_doc').upsert({id: PROGRESS_ROW_ID, content: JSON.stringify(progressMap)});
  if(error) alert('儲存失敗：' + error.message);
}

function showSaving(show){
  document.getElementById('savingInd').classList.toggle('show', show);
}

// fetch 最新版本 → 合併本地變更 → 存回（避免覆蓋他人勾選）
async function mergeAndSave(changeFn){
  showSaving(true);
  const latest = await loadProgress();
  progressMap = {...latest};
  changeFn();
  render();
  await saveProgress();
  showSaving(false);
}

// ── 依完成率跳一句加油的話（每次重整換一句） ──────────────
const CHEERS={
  low:[ // 未達 80%
    '精準度滿分！繼續保持！',
    '今日神速出題手就是你！',
    '感謝你的專注，品質完美提升！',
    '每完成一份，就離完整題庫更近一步，加油！',
    '細心校對的你，是題庫最重要的功臣 💪',
    '再一份、再一份，完成率正在往上爬 📈',
    '穩紮穩打，福大自然題庫就靠你們了！',
  ],
  s80:[ // 80–89% 終點在望
    '目標已完成 80%！感謝你的仔細，勝利就在眼前。',
    '進度條飆升中，最後的哩程，一起衝刺！',
    '校對與出題辛苦了！再堅持一下，成果即將解鎖。',
  ],
  s90:[ // 90–99% 最後衝刺
    '完成度超過 90%！倒數計時，最後幾題交給你了！',
    '距離完工只差最後一步，感謝你的專業與耐性！',
    '終點線就在腳下，把最後的細節完美收尾吧！',
  ],
  done:[ // 100% 成就解鎖
    '恭喜完成！考卷製作順利完工，感謝你的辛苦付出！',
    '任務達成！感謝你為學生打造優質的試題品質。',
    '完美收工！辛苦了，給自己一個大大的讚吧！',
  ],
};
let _cheerPending=true;
function showCheer(rate){
  const pool = rate>=100?CHEERS.done : rate>=90?CHEERS.s90 : rate>=80?CHEERS.s80 : CHEERS.low;
  const el=document.getElementById('cheer');
  if(el) el.textContent='✦ '+pool[Math.floor(Math.random()*pool.length)];
}

// ── 載入所有題目清單 ──────────────────────────────
async function loadAll(){
  _cheerPending=true;
  document.getElementById('tbody').innerHTML = '<tr><td colspan="10" class="loading">載入中…</td></tr>';
  document.getElementById('emptyMsg').style.display = 'none';

  let allQs = [], from = 0;
  while(true){
    const {data, error} = await sb.from('questions').select('year,school,exam,book,type').neq('type','passage').range(from, from + 999);
    if(error || !data || !data.length) break;
    allQs = allQs.concat(data);
    if(data.length < 1000) break;
    from += 1000;
  }

  // 依語意 key 分組：school + grade + year + examRound
  const grouped = {};
  allQs.forEach(q => {
    const school = (q.school||'').trim();
    const grade  = gradeFromExam(q.exam||'', q.book||'');
    const year   = (q.year||'').trim();
    const round  = examRound(q.exam||'');
    const key    = makeId(school, grade, year, round);
    if(!grouped[key]) grouped[key] = {school, grade, year, round, displayName: composeDisplayName(school,grade,year,round), count: 0, examRaw: (q.exam||'').trim()};
    grouped[key].count++;
  });
  exams = Object.values(grouped);

  progressMap = await loadProgress();
  // 合併手動新增的考卷
  const manuals = progressMap['__manuals__'] || [];
  manuals.forEach(name => {
    const key = 'manual|||' + name;
    if(!exams.find(e => makeId(e.school,e.grade,e.year,e.round)===key))
      exams.push({school:'',grade:'',year:'',round:'',displayName:name,count:null,isManual:true});
  });
  const hidden = new Set(progressMap['__hidden__'] || []);
  exams = exams.filter(ex => ex.isManual || !hidden.has(makeId(ex.school, ex.grade, ex.year, ex.round)));
  sortAndRender();
}

// ── 排序 ────────────────────────────────────────────
function sortBy(key){
  if(sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  sortAndRender();
}

function sortAndRender(){
  exams.sort((a, b) => {
    const av = sortKey==='displayName' ? a.displayName : (a[sortKey]||a.displayName||'');
    const bv = sortKey==='displayName' ? b.displayName : (b[sortKey]||b.displayName||'');
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  render();
}

// ── 渲染 ────────────────────────────────────────────
function makeId(school, grade, year, round){
  if(round==='會考') return '會考|||'+(year||'');
  if(school==='__manual__') return 'manual|||'+(grade||'');
  return [school||'', grade||'', year||'', round||''].join('|||');
}
function manualKey(name){ return makeId('__manual__', name, '', ''); }

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function fmtTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'})
       + ' ' + d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
}

function render(){
  const tbody = document.getElementById('tbody');
  document.getElementById('statLine').textContent = '共 ' + exams.length + ' 份考卷';

  if(!exams.length){
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  const doneCount = exams.filter(ex => {
    const p = progressMap[makeId(ex.school, ex.grade, ex.year, ex.round)] || {};
    return p.verified_formula && p.has_images && p.has_sol && p.verified_questions && p.verified_groups && p.other_ok;
  }).length;
  const rate = exams.length ? Math.round(doneCount / exams.length * 100) : 0;
  document.getElementById('statLine').textContent =
    '共 ' + exams.length + ' 份考卷　·　全部完成 ' + doneCount + ' 份　·　完成率 ' + rate + '%';
  if(_cheerPending){ showCheer(rate); _cheerPending=false; }

  tbody.innerHTML = exams.map(ex => {
    const id  = ex.isManual ? manualKey(ex.displayName) : makeId(ex.school, ex.grade, ex.year, ex.round);
    const p   = progressMap[id] || {};
    const shownName = p.customName !== undefined ? p.customName : ex.displayName;
    const allDone = p.verified_formula && p.has_images && p.has_sol && p.verified_questions && p.verified_groups && p.other_ok;
    const rowStyle = allDone ? 'background:#f0fbf5' : '';
    const delBtn = ex.isManual
      ? `<button class="del-btn" title="刪除此列" onclick="deleteManual('${esc(ex.displayName)}')">✕</button>`
      : `<button class="del-btn" title="隱藏此列（題目不會被刪）" onclick="hideEntry('${esc(id)}','${esc(shownName)}')">✕</button>`;
    const linkBtn = ex.examRaw
      ? `<a class="link-btn" href="index.html?exam=${encodeURIComponent(ex.examRaw)}" target="_blank" title="在題庫系統中開啟這份考卷的所有題目"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg></a>`
      : `<span class="link-btn-ph"></span>`;
    const countCell = ex.count===null ? '<span style="color:#bbb">—</span>' : `<span class="count-badge">${ex.count}</span>`;
    return `<tr style="${rowStyle}">
      <td style="display:flex;align-items:center;gap:4px">${delBtn}${linkBtn}<input class="name-inp-cell" value="${esc(shownName)}" onblur="updateName('${esc(id)}',this.value)"></td>
      <td class="center">${countCell}</td>
      <td class="chk-cell"><input type="checkbox" title="確認公式" ${p.verified_formula?'checked':''} onchange="toggle('${esc(id)}','verified_formula',this.checked)"></td>
      <td class="chk-cell"><input type="checkbox" title="上傳圖片" ${p.has_images?'checked':''} onchange="toggle('${esc(id)}','has_images',this.checked)"></td>
      <td class="chk-cell"><input type="checkbox" title="製作詳解" ${p.has_sol?'checked':''} onchange="toggle('${esc(id)}','has_sol',this.checked)"></td>
      <td class="chk-cell"><input type="checkbox" title="題幹敘述確認" ${p.verified_questions?'checked':''} onchange="toggle('${esc(id)}','verified_questions',this.checked)"></td>
      <td class="chk-cell"><input type="checkbox" title="題組/承上題確認" ${p.verified_groups?'checked':''} onchange="toggle('${esc(id)}','verified_groups',this.checked)"></td>
      <td class="chk-cell"><input type="checkbox" title="其他確認" ${p.other_ok?'checked':''} onchange="toggle('${esc(id)}','other_ok',this.checked)"></td>
      <td><input class="note-inp" value="${esc(p.notes||'')}" placeholder="備註…" onblur="updateNote('${esc(id)}',this.value)"></td>
      <td class="ts-cell">${p.updated_by ? '<b>'+esc(p.updated_by)+'</b><br>' : ''}${fmtTime(p.updated_at)}</td>
    </tr>`;
  }).join('');
}

// ── 勾選 ────────────────────────────────────────────
async function toggle(id, field, val){
  const who = document.getElementById('userName').value.trim() || '未填姓名';
  await mergeAndSave(() => {
    progressMap[id] = {
      ...(progressMap[id]||{}),
      [field]: val,
      updated_by: who,
      updated_at: new Date().toISOString()
    };
  });
}

// ── 備註 ────────────────────────────────────────────
async function updateNote(id, val){
  if((progressMap[id]||{}).notes === val) return;
  const who = document.getElementById('userName').value.trim() || '未填姓名';
  await mergeAndSave(() => {
    progressMap[id] = {
      ...(progressMap[id]||{}),
      notes: val,
      updated_by: who,
      updated_at: new Date().toISOString()
    };
  });
}

// ── 考卷名稱手動編輯 ────────────────────────────────
async function updateName(id, val){
  if((progressMap[id]||{}).customName === val) return;
  const who = document.getElementById('userName').value.trim() || '未填姓名';
  await mergeAndSave(() => {
    progressMap[id] = {
      ...(progressMap[id]||{}),
      customName: val,
      updated_by: who,
      updated_at: new Date().toISOString()
    };
  });
}

// ── 手動新增考卷 ──────────────────────────────────────
async function addManualExam(){
  const name = prompt('請輸入考卷名稱：\n（格式建議：士林-九年級-114上-第一次段考）');
  if(!name || !name.trim()) return;
  const trimmed = name.trim();
  await mergeAndSave(() => {
    const manuals = progressMap['__manuals__'] || [];
    if(manuals.includes(trimmed)){ alert('此名稱已存在'); return; }
    progressMap['__manuals__'] = [...manuals, trimmed];
    exams.push({school:'',grade:'',year:'',round:'',displayName:trimmed,count:null,isManual:true});
  });
}

// ── 隱藏非手動列 ──────────────────────────────────────
async function hideEntry(id, name){
  if(!confirm('隱藏「'+name+'」？\n（相關題目不會被刪除，此列將不再顯示）')) return;
  await mergeAndSave(() => {
    const hidden = progressMap['__hidden__'] || [];
    if(!hidden.includes(id)) progressMap['__hidden__'] = [...hidden, id];
  });
  await loadAll();
}

// ── 刪除手動列 ────────────────────────────────────────
async function deleteManual(name){
  if(!confirm('確定要刪除「'+name+'」這一列嗎？')) return;
  await mergeAndSave(() => {
    progressMap['__manuals__'] = (progressMap['__manuals__']||[]).filter(n=>n!==name);
    delete progressMap[manualKey(name)];
    exams = exams.filter(e=>!(e.isManual && e.displayName===name));
  });
}

// ── Realtime：即時同步他人變更 ──────────────────────────
sb.channel('progress-sync')
  .on('postgres_changes', {
    event: 'UPDATE',
    schema: 'public',
    table: 'syllabus_doc',
    filter: `id=eq.${PROGRESS_ROW_ID}`
  }, payload => {
    try {
      const newMap = JSON.parse(payload.new.content || '{}');
      progressMap = newMap;
      render();
    } catch(e){}
  })
  .subscribe();

loadName();
loadAll();
</script>
</body>
</html>
